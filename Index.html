<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeBank v4 — Gestão de Banca Esportiva</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0e0f11;--bg2:#16181c;--bg3:#1e2026;--bg4:#262830;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0f0f0;--text2:#9299a8;--text3:#5a6070;
  --green:#22d3a0;--green-dim:rgba(34,211,160,0.12);--green-border:rgba(34,211,160,0.3);
  --red:#f25757;--red-dim:rgba(242,87,87,0.12);--red-border:rgba(242,87,87,0.3);
  --blue:#4f8ef7;--blue-dim:rgba(79,142,247,0.12);--blue-border:rgba(79,142,247,0.3);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.12);--amber-border:rgba(245,166,35,0.3);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);
  --pend:#f5a623;--pend-dim:rgba(245,166,35,0.15);--pend-border:rgba(245,166,35,0.4);
  --radius:10px;--radius-lg:14px;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
/* ── TEMA CLARO ── */
html.light {
  --bg:#f4f5f7;--bg2:#ffffff;--bg3:#eef0f3;--bg4:#e2e5ea;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#111318;--text2:#4a5262;--text3:#8a94a6;
  --green:#0e9e74;--green-dim:rgba(14,158,116,0.10);--green-border:rgba(14,158,116,0.25);
  --red:#d63b3b;--red-dim:rgba(214,59,59,0.10);--red-border:rgba(214,59,59,0.25);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,0.10);--blue-border:rgba(37,99,235,0.25);
  --amber:#c27c0a;--amber-dim:rgba(194,124,10,0.10);--amber-border:rgba(194,124,10,0.25);
  --purple:#7c3aed;--purple-dim:rgba(124,58,237,0.10);
  --pend:#c27c0a;--pend-dim:rgba(194,124,10,0.12);--pend-border:rgba(194,124,10,0.3);
}
html.light body{background:var(--bg);color:var(--text);}
html.light .sidebar{background:var(--bg2);border-right:1px solid var(--border);}
html.light .topbar{background:var(--bg2);border-bottom:1px solid var(--border);}
html.light .card,.html.light .mc,.html.light .cfg-card{background:var(--bg2);}
html.light select option{background:var(--bg2);color:var(--text);}
/* Theme toggle button */
.theme-btn{padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg3);cursor:pointer;color:var(--text);font-size:16px;line-height:1;transition:all .15s;}
.theme-btn:hover{background:var(--bg4);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:14px;line-height:1.5;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s;overflow-y:auto;}
.sidebar-logo{padding:22px 20px 16px;border-bottom:1px solid var(--border);}
.logo-mark{font-size:18px;font-weight:700;letter-spacing:-.5px;color:var(--text);}
.logo-mark span{color:var(--green);}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.08em;margin-top:2px;}
.nav-section{padding:16px 12px 8px;font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:2px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;border:none;background:none;width:calc(100% - 16px);text-align:left;font-family:var(--font);}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);}
.nav-item .icon{width:16px;height:16px;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border);border-radius:99px;font-size:10px;font-family:var(--mono);padding:1px 6px;}
.nav-bottom{margin-top:auto;padding:16px;border-top:1px solid var(--border);}
.nav-bottom-info{font-size:11px;color:var(--text3);font-family:var(--mono);}
.main{margin-left:220px;flex:1;min-width:0;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.page-title{font-size:16px;font-weight:600;color:var(--text);}
.page-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px;}
.topbar-actions{display:flex;gap:8px;}
.content{padding:24px 28px;max-width:1100px;}
.screen{display:none;}.screen.active{display:block;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.card-title .dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.mc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;}
.mc.accent-g{border-color:var(--green-border);background:var(--green-dim);}
.mc.accent-r{border-color:var(--red-border);background:var(--red-dim);}
.mc.accent-b{border-color:var(--blue-border);background:var(--blue-dim);}
.mc.accent-a{border-color:var(--amber-border);background:var(--amber-dim);}
.ml{font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.05em;margin-bottom:5px;text-transform:uppercase;}
.mv{font-size:18px;font-weight:600;color:var(--text);font-family:var(--mono);}
.mv.g{color:var(--green);}.mv.r{color:var(--red);}.mv.b{color:var(--blue);}.mv.a{color:var(--amber);}.mv.p{color:var(--purple);}
.mv-sm{font-size:14px;}
.btn{padding:8px 18px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg3);font-size:13px;font-weight:500;cursor:pointer;color:var(--text);font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--bg4);}
.btn.g{background:var(--green-dim);color:var(--green);border-color:var(--green-border);}
.btn.g:hover{background:rgba(34,211,160,0.2);}
.btn.r{background:var(--red-dim);color:var(--red);border-color:var(--red-border);}
.btn.r:hover{background:rgba(242,87,87,0.2);}
.btn.b{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-border);}
.btn.a{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-border);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.form-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.form-row label{font-size:11px;font-family:var(--mono);color:var(--text3);min-width:140px;text-transform:uppercase;letter-spacing:.05em;}
.form-row input,.form-row select,.form-row textarea{flex:1;min-width:120px;padding:8px 12px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:var(--font);outline:none;transition:border .15s;}
.form-row textarea{min-height:80px;resize:vertical;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-dim);}
.form-row select option{background:var(--bg3);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;font-family:var(--mono);}
.badge.g{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);}
.badge.r{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border);}
.badge.b{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-border);}
.badge.a{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border);}
.badge.p{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(167,139,250,0.3);}
.badge.pend{background:var(--pend-dim);color:var(--pend);border:1px solid var(--pend-border);}
.ph1{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);}
.ph2{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-border);}
.ph3{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border);}
.alert{padding:10px 14px;border-radius:var(--radius);margin-bottom:8px;font-size:12px;display:flex;align-items:flex-start;gap:9px;border-left:3px solid;}
.alert.g{background:var(--green-dim);border-color:var(--green);color:#a7f3d0;}
.alert.r{background:var(--red-dim);border-color:var(--red);color:#fca5a5;}
.alert.b{background:var(--blue-dim);border-color:var(--blue);color:#93c5fd;}
.alert.a{background:var(--amber-dim);border-color:var(--amber);color:#fcd34d;}
.pbar{background:var(--bg4);border-radius:99px;height:6px;overflow:hidden;margin:5px 0 3px;}
.pfill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.pfill.g{background:var(--green);}.pfill.b{background:var(--blue);}.pfill.a{background:var(--amber);}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;font-weight:600;font-size:10px;font-family:var(--mono);color:var(--text3);padding:8px 10px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;}
td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);font-size:12px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
.msel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.ms{padding:5px 12px;border-radius:99px;border:1px solid var(--border2);background:transparent;font-size:11px;font-weight:500;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all .15s;}
.ms:hover{color:var(--text);background:var(--bg3);}
.ms.active{font-weight:600;}
.chart-wrap{position:relative;width:100%;height:200px;}
.cfg-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;}
.cfg-card-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.cfg-inputs{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;}
.cfg-ig{display:flex;flex-direction:column;gap:4px;}
.cfg-ig label{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.cfg-ig input,.cfg-ig select{padding:7px 10px;font-size:12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-family:var(--mono);outline:none;width:100%;transition:border .15s;}
.cfg-ig input:focus,.cfg-ig select:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-dim);}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:14px;}
.sep{border:none;border-top:1px solid var(--border);margin:14px 0;}
.sec{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;margin-top:4px;}
.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;font-size:12px;}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:13px;font-family:var(--mono);}
/* PENDING ENTRY */
.pend-row{background:var(--pend-dim);border:1px solid var(--pend-border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.pend-row .pinfo{flex:1;min-width:180px;font-size:12px;}
.pend-row .pactions{display:flex;gap:5px;flex-shrink:0;flex-direction:column;align-items:flex-end;}
/* CASAS */
.casa-tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:600;font-family:var(--mono);}
/* NOTES */
.note-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border .15s;}
.note-card:hover{border-color:var(--border2);}
.note-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.note-meta{font-size:10px;color:var(--text3);font-family:var(--mono);}
.note-body{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.6;white-space:pre-wrap;}
.note-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.note-tag{padding:1px 7px;border-radius:99px;font-size:10px;font-family:var(--mono);background:var(--bg4);color:var(--text3);border:1px solid var(--border);}
.note-search{width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:var(--font);outline:none;margin-bottom:12px;transition:border .15s;}
.note-search:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-dim);}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;max-width:560px;width:90%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px 6px;}
.modal-close:hover{color:var(--text);}
.modal input,.modal textarea,.modal select{width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:var(--font);outline:none;margin-bottom:10px;transition:border .15s;}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-dim);}
.modal textarea{min-height:110px;resize:vertical;}
.modal label{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;}
/* MOBILE */
.mob-toggle{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:8px;cursor:pointer;color:var(--text);}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .mob-toggle{display:flex;}
  .sidebar-overlay.show{display:block;}
  .content{padding:16px;}
  .topbar{padding:14px 16px 14px 52px;}
  .mg{grid-template-columns:repeat(2,1fr);}
}
/* ── RELATÓRIO ── */
.rpt-period-sel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.rpt-period-btn{padding:6px 16px;border-radius:99px;border:1px solid var(--border2);background:transparent;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all .15s;}
.rpt-period-btn.active{background:var(--green-dim);color:var(--green);border-color:var(--green-border);}
.rpt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
.rpt-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;}
.rpt-label{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.rpt-val{font-size:20px;font-weight:600;font-family:var(--mono);color:var(--text);}
.rpt-val.g{color:var(--green);}.rpt-val.r{color:var(--red);}.rpt-val.b{color:var(--blue);}
.rpt-section{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.rpt-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px;}
.rpt-table th{text-align:left;padding:7px 10px;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono);text-transform:uppercase;font-weight:600;}
.rpt-table td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text);}
.rpt-bar-wrap{height:6px;background:var(--bg4);border-radius:99px;overflow:hidden;min-width:80px;}
.rpt-bar-fill{height:100%;border-radius:99px;}
/* Print styles */
.marco-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;position:relative;overflow:hidden;}
.marco-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;}
.marco-card.atingido::before{background:var(--green);}
.marco-card.atingido{border-color:var(--green-border);background:var(--green-dim);}
.marco-card.no-prazo::before{background:var(--blue);}
.marco-card.atrasado::before{background:var(--red);}
.marco-card.atrasado{border-color:var(--red-border);}
.marco-card.pendente::before{background:var(--amber);}
.marco-timeline{position:relative;padding-left:28px;margin-bottom:8px;}
.marco-timeline::before{content:'';position:absolute;left:8px;top:16px;bottom:0;width:2px;background:var(--border);}
.marco-node{position:absolute;left:0;top:4px;width:18px;height:18px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:9px;}
.marco-form{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;}
.marco-pbar-wrap{height:8px;background:var(--bg4);border-radius:99px;overflow:hidden;margin:6px 0 4px;}
.marco-pbar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.cmp-sel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px;}
.cmp-sel-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;cursor:pointer;transition:all .15s;text-align:center;}
.cmp-sel-card:hover{border-color:var(--border2);background:var(--bg3);}
.cmp-sel-card.selected{background:var(--bg3);}
.cmp-sel-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.cmp-sel-sub{font-size:10px;color:var(--text3);font-family:var(--mono);}
.cmp-metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px;}
.cmp-metric-row{display:contents;}
.cmp-metric-label{background:var(--bg3);padding:10px 14px;font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;border-bottom:1px solid var(--border);}
.cmp-metric-val{padding:10px 14px;font-size:14px;font-weight:600;font-family:var(--mono);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cmp-winner{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:99px;margin-left:6px;}
.cmp-chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:14px;}
.cmp-chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;}
.cmp-chart-title{font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.cmp-chart-canvas{position:relative;height:180px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
.cal-dow{text-align:center;font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:4px 0;}
.cal-day{min-height:72px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);padding:6px;cursor:pointer;transition:border .15s;position:relative;}
.cal-day:hover{border-color:var(--border2);}
.cal-day.today{border-color:var(--blue);background:rgba(79,142,247,0.06);}
.cal-day.has-green{border-color:var(--green-border);background:var(--green-dim);}
.cal-day.has-red{border-color:var(--red-border);background:var(--red-dim);}
.cal-day.has-mixed{border-color:var(--amber-border);background:var(--amber-dim);}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-day.other-month{opacity:0.3;}
.cal-day-num{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--text2);margin-bottom:4px;}
.cal-day.today .cal-day-num{color:var(--blue);}
.cal-day.has-green .cal-day-num{color:var(--green);}
.cal-day.has-red .cal-day-num,.cal-day.has-mixed .cal-day-num{color:var(--amber);}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:3px;}
.cal-dot{width:6px;height:6px;border-radius:50%;}
.cal-liq{font-size:10px;font-family:var(--mono);font-weight:600;}
.cal-count{font-size:9px;font-family:var(--mono);color:var(--text3);}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.cal-month-label{font-size:16px;font-weight:600;color:var(--text);min-width:160px;text-align:center;}
.cal-detail{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:14px 16px;margin-top:12px;}
.cal-detail-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;}
.cal-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.cal-filter-btn{padding:4px 12px;border-radius:99px;border:1px solid var(--border2);background:transparent;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--font);}
.cal-filter-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2);}
@media print{
  .sidebar,.topbar,.mob-toggle,.sidebar-overlay{display:none!important;}
  .main{margin-left:0!important;}
  .content{padding:0!important;}
  .screen{display:none!important;}
  #s-relatorio{display:block!important;}
  .rpt-no-print{display:none!important;}
  body{background:#fff!important;color:#111!important;}
  .rpt-print-header{display:block!important;}
  .card,.rpt-card{background:#fff!important;border-color:#ddd!important;}
  .rpt-card,.rpt-table td,.rpt-table th{color:#111!important;}
  .rpt-table{page-break-inside:avoid;}
}
.rpt-print-header{display:none;}
</style>

<script>
// ─── MÉTODOS ───────────────────────────────────────────────────────────────
const METHODS_DEF=[
  {id:'lay01',  name:'Lay 0x1',       color:'#22d3a0',type:'lay', inputMode:'responsabilidade', desc:'Lay no placar 0x1 — risco fixo, lucro = risco÷(odd-1)', oddMin:17, oddMax:25, stake0:150, metaStake:1000, reds:2},
  {id:'lay10',  name:'Lay 1x0',       color:'#f5a623',type:'lay', inputMode:'responsabilidade', desc:'Lay no placar 1x0 — risco fixo, lucro = risco÷(odd-1)', oddMin:17, oddMax:25, stake0:150, metaStake:1000, reds:2},
  {id:'layover',name:'Lay Over FT',   color:'#4f8ef7',type:'lay', inputMode:'responsabilidade', desc:'Lay Over FT — responsabilidade fixa', oddMin:1.5, oddMax:3.5, stake0:50, metaStake:300, reds:3},
  {id:'layunder',name:'Lay Under FT', color:'#a78bfa',type:'lay', inputMode:'responsabilidade', desc:'Lay Under FT — responsabilidade fixa', oddMin:1.5, oddMax:3.5, stake0:50, metaStake:300, reds:3},
  {id:'afrente',name:'A Frente FT',   color:'#f25757',type:'back',inputMode:'back',             desc:'Back no time à frente', oddMin:1.3, oddMax:2.5, stake0:100, metaStake:500, reds:2},
  {id:'layemp', name:'Lay Empate',    color:'#34d399',type:'lay', inputMode:'responsabilidade', desc:'Lay no empate FT', oddMin:2.5, oddMax:5.0, stake0:80, metaStake:500, reds:2},
  {id:'over25', name:'Over 2.5 FT',   color:'#f472b6',type:'back',inputMode:'back',             desc:'Back no Over 2.5', oddMin:1.6, oddMax:2.8, stake0:100, metaStake:500, reds:3},
  {id:'btts',   name:'BTTS',          color:'#fb923c',type:'back',inputMode:'back',             desc:'Ambas marcam', oddMin:1.6, oddMax:2.5, stake0:100, metaStake:500, reds:3},
  {id:'custom', name:'Personalizado', color:'#94a3b8',type:'lay', inputMode:'responsabilidade', desc:'Método personalizado', oddMin:1.5, oddMax:30, stake0:150, metaStake:1000, reds:2},
];

// ─── DEFAULT CASAS ─────────────────────────────────────────────────────────
const CASAS_DEFAULT=[
  {id:'betfair', name:'Betfair',         color:'#f5a623', banca:1000},
  {id:'fullbet', name:'FulltBet',        color:'#4f8ef7', banca:500},
  {id:'bolsa',   name:'Bolsa de Aposta',  color:'#22d3a0', banca:500},
];

// ─── STATE ─────────────────────────────────────────────────────────────────
let methodCfg={};
let globalCfg={epd:3,dpw:5};
let entradas=[];
let pendentes=[];   // entradas aguardando resultado
let casas=[];       // casas de apostas
let notas=[];       // base de conhecimento
let marcos=[];      // metas e marcos personalizados
let backupCfg={auto:true,freq:'10entradas',lastBackup:null,history:[]}; // backup automático — ATIVO por padrão
let backupEntradaCount=0; // contador de entradas desde último backup
let pendMonitor={}; // {pendId: {interval, nextAt, count}} controle dos timers de monitoramento
let activeMethodId='lay01';
let activeHistMethod='all';
let activeHistCasa='all';
let activeDashCasa=null; // null = todas as casas
let editNoteId=null;
let dashChart=null;

const pageTitles={
  dashboard:['Painel','visão geral da banca'],
  metodos:['Métodos','todos os métodos configurados'],
  casas:['Casas','gerenciamento de casas de apostas'],
  entrada:['Registrar','nova entrada'],
  pendentes:['Pendentes','entradas aguardando resultado'],
  historico:['Histórico','todas as entradas registradas'],
  projecao:['Projeção','estimativas futuras'],
  notas:['Base de conhecimento','análises, regras e anotações'],
  config:['Configuração','ajustes por método'],
  relatorio:['Relatório','resumo por período, casa e método'],
  calendario:['Calendário','visualização mensal de entradas'],
  marcos:['Metas & Marcos','marcos e estimativas de conclusão'],
  comparacao:['Comparação de Casas','métricas e gráficos lado a lado'],
};

// ─── HELPERS ───────────────────────────────────────────────────────────────
function mById(id){return METHODS_DEF.find(m=>m.id===id)||METHODS_DEF[0];}
function mcfg(id){return methodCfg[id]||mById(id);}
function curM(){return mById(activeMethodId);}
function curMC(){return mcfg(activeMethodId);}
function fmt(v){return 'R$ '+parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function calcProfit(entrada,odd,inputMode){
  if((inputMode||'responsabilidade')==='responsabilidade') return parseFloat((entrada/(odd-1)).toFixed(2));
  return parseFloat((entrada*(odd-1)).toFixed(2));
}
function getInputMode(m){return m.inputMode||'responsabilidade';}
function getStakeBase(mid,casaId){
  const mc=mcfg(mid);
  return (casaId&&mc.stakesPorCasa&&mc.stakesPorCasa[casaId]!=null)?mc.stakesPorCasa[casaId]:mc.stake0;
}
function getMetaStake(mid,casaId){
  const mc=mcfg(mid);
  return (casaId&&mc.metasPorCasa&&mc.metasPorCasa[casaId]!=null)?mc.metasPorCasa[casaId]:mc.metaStake;
}
function getRedsCobrir(mid,casaId){
  const mc=mcfg(mid);
  return (casaId&&mc.redsPorCasa&&mc.redsPorCasa[casaId]!=null)?mc.redsPorCasa[casaId]:mc.reds;
}
function getStake(mid,casaId){
  const base=getStakeBase(mid,casaId);
  // Filtragem ESTRITA: cada casa tem sua própria linha progressiva independente
  const ents=entradas.filter(function(e){
    if(e.methodId!==mid) return false;
    if(casaId) return e.casaId===casaId;          // com casa: só entradas desta casa
    return !e.casaId||e.casaId==='';              // sem casa: só entradas sem casa
  });
  if(!ents.length) return base;
  return ents[ents.length-1].stakeAfter;
}
function getPhase(mid,casaId){const s=getStake(mid,casaId);const meta=getMetaStake(mid,casaId);const reds=getRedsCobrir(mid,casaId);if(s<meta) return 1;if(getCapital(mid,casaId)<meta*reds) return 2;return 3;}
function getCapital(mid,casaId){
  return entradas.filter(function(e){
    if(e.methodId!==mid) return false;
    if((e.phase!==2&&e.phase!==3)||e.result!=='green') return false;
    if(casaId===undefined||casaId===null) return true; // sem filtro = todas as casas
    if(casaId) return e.casaId===casaId;
    return !e.casaId||e.casaId==='';
  }).reduce((a,e)=>a+e.profit,0);
}
function getRedsConsec(mid,casaId){
  const ents=entradas.filter(function(e){
    if(e.methodId!==mid) return false;
    if(casaId===undefined||casaId===null) return true; // todas as casas
    if(casaId) return e.casaId===casaId;
    return !e.casaId||e.casaId==='';
  });
  let c=0;for(let i=ents.length-1;i>=0;i--){if(ents[i].result==='red')c++;else break;}return c;
}
function phBadge(ph){return `<span class="badge ${ph===1?'ph1':ph===2?'ph2':'ph3'}">Fase ${ph}</span>`;}
function mselBtns(activeId,fn){
  return `<div class="msel">${METHODS_DEF.map(m=>`<button class="ms${activeId===m.id?' active':''}" style="${activeId===m.id?'background:'+m.color+'20;color:'+m.color+';border-color:'+m.color+'50':''}" onclick="${fn}('${m.id}')">${m.name}</button>`).join('')}</div>`;
}
function casaById(id){return casas.find(c=>c.id===id)||null;}
function getCasaTag(casaId){
  const c=casaById(casaId);
  if(!c) return '';
  return `<span class="casa-tag" style="background:${c.color}20;color:${c.color};border:1px solid ${c.color}50">${c.name}</span>`;
}

// ─── AMBIENTE (PROD / STAGING) ─────────────────────────────────────────────
let currentEnv = localStorage.getItem('tb_env') || 'prod'; // 'prod' | 'stage'

function envKey(k){ return (currentEnv==='stage'?'stage_':'')+k; }

function switchEnv(env){
  if(env===currentEnv) return;
  if(env===currentEnv) return;
  if(!confirm(env==='stage'?'Entrar no AMBIENTE DE TESTES? Os dados de produção ficam intactos.':'Voltar para PRODUÇÃO? Os dados de testes ficam salvos no staging.')) return;
  currentEnv = env;
  localStorage.setItem('tb_env', env);
  // Reset estado em memória
  globalCfg={epd:3,dpw:5};
  methodCfg={};
  entradas=[];pendentes=[];casas=[];notas=[];marcos=[];
  backupCfg={auto:true,freq:'10entradas',lastBackup:null,history:[]};
  activeMethodId='lay01';
  loadData();
  updateEnvBar();
}

function cloneProdToStage(){
  if(currentEnv!=='stage'){alert('Entre no ambiente de testes primeiro.');return;}
  if(!confirm('Copiar todos os dados de produção para o staging? Os dados atuais de testes serão substituídos.')) return;
  const keys=['gcfg4','mcfg4','ent4','pend4','casas4','notas4','marcos4','bkpcfg4','amid4'];
  keys.forEach(function(k){
    const v=localStorage.getItem(k);
    if(v) localStorage.setItem('stage_'+k, v);
    else localStorage.removeItem('stage_'+k);
  });
  // Reset estado e recarrega
  globalCfg={epd:3,dpw:5};methodCfg={};entradas=[];pendentes=[];casas=[];notas=[];marcos=[];
  backupCfg={auto:true,freq:'10entradas',lastBackup:null,history:[]};activeMethodId='lay01';
  loadData();
  showBackupToast('✅ Dados de produção copiados para staging');
}

function promoverParaProd(){
  if(currentEnv!=='stage'){alert('Você precisa estar no staging para promover.');return;}
  if(!confirm('Promover CONFIGURAÇÕES do staging para produção? Serão transferidos: configurações gerais, métodos e casas. Histórico, notas e marcos de produção ficam intactos.')) return;
  // Copia só as configurações para produção
  ['gcfg4','mcfg4','casas4'].forEach(function(k){
    const v=localStorage.getItem('stage_'+k);
    if(v) localStorage.setItem(k, v);
  });
  showBackupToast('🚀 Configurações promovidas para produção!');
  // Oferece voltar para prod
  if(confirm('Configurações promovidas! Deseja voltar para o ambiente de produção agora?')){
    switchEnv('prod');
  }
}

function loadData(){
  try{
    const g=localStorage.getItem(envKey('gcfg4'));if(g) globalCfg=JSON.parse(g);
    const mc=localStorage.getItem(envKey('mcfg4'));if(mc) methodCfg=JSON.parse(mc);
    const e=localStorage.getItem(envKey('ent4'));if(e) entradas=JSON.parse(e);
    const p=localStorage.getItem(envKey('pend4'));if(p) pendentes=JSON.parse(p);
    const cv=localStorage.getItem(envKey('casas4'));if(cv) casas=JSON.parse(cv); else casas=[...CASAS_DEFAULT];
    const n=localStorage.getItem(envKey('notas4'));if(n) notas=JSON.parse(n);
    const mk=localStorage.getItem(envKey('marcos4'));if(mk) marcos=JSON.parse(mk);
    const bk=localStorage.getItem(envKey('bkpcfg4'));if(bk){try{const bkp=JSON.parse(bk);backupCfg={...backupCfg,...bkp};}catch(e){}}
    const am=localStorage.getItem(envKey('amid4'));if(am) activeMethodId=am;
  }catch(ex){}
  METHODS_DEF.forEach(m=>{if(!methodCfg[m.id]) methodCfg[m.id]={stake0:m.stake0,metaStake:m.metaStake,reds:m.reds,oddMin:m.oddMin,oddMax:m.oddMax};});
  if(!casas.length) casas=[...CASAS_DEFAULT];
  if(!marcos) marcos=[];
  // Migração: garante que todas as casas padrão existam
  CASAS_DEFAULT.forEach(function(cd){

      casas.push({...cd});

// ─── PERIOD HELPERS ────────────────────────────────────────────────────────
function parseDateBR(str){
  // str pode ser "26/04/2026, 19:09:03" ou "26/04/2026"
  if(!str) return null;
  const parts=str.split(',')[0].trim().split('/');
  if(parts.length<3) return null;
  return new Date(+parts[2],+parts[1]-1,+parts[0]);
}

function startOfDay(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function startOfWeek(d){const day=d.getDay();const diff=day===0?-6:1-day;return startOfDay(new Date(d.getFullYear(),d.getMonth(),d.getDate()+diff));}
function startOfMonth(d){return new Date(d.getFullYear(),d.getMonth(),1);}

function periodStats(ents,from){
  const filtered=ents.filter(function(e){
    const d=parseDateBR(e.date);
    return d&&d>=from;
  });
  const g=filtered.filter(function(e){return e.result==='green';});
  const r=filtered.filter(function(e){return e.result==='red';});
  const lucro=g.reduce(function(a,e){return a+e.profit;},0);
  const perda=r.reduce(function(a,e){return a+e.stake;},0);
  return {total:filtered.length,g:g.length,r:r.length,liq:parseFloat((lucro-perda).toFixed(2)),lucro:parseFloat(lucro.toFixed(2)),perda:parseFloat(perda.toFixed(2))};
}

function trendArrow(cur,prev){
  if(prev===0&&cur===0) return {arrow:'—',cls:'',tip:'sem dados'};
  if(prev===0) return {arrow:'▲',cls:'g',tip:'primeiro período'};
  const diff=cur-prev;
  const pct=Math.abs((diff/Math.abs(prev))*100).toFixed(0);
  if(diff>0) return {arrow:'▲ '+pct+'%',cls:'g',tip:'vs período anterior'};
  if(diff<0) return {arrow:'▼ '+pct+'%',cls:'r',tip:'vs período anterior'};
  return {arrow:'= 0%',cls:'',tip:'igual ao período anterior'};
}

// ─── DASHBOARD ─────────────────────────────────────────────────────────────
function renderDash(){
  const m=curM();const mc=curMC();
  // Filtra por casa se uma estiver selecionada
  const stake=getStake(m.id,activeDashCasa||undefined);
  const stakeIni=activeDashCasa?getStakeBase(m.id,activeDashCasa):mc.stake0;
  const metaUsarDash=getMetaStake(m.id,activeDashCasa||undefined);
  const redsUsarDash=getRedsCobrir(m.id,activeDashCasa||undefined);
  const phase=getPhase(m.id,activeDashCasa||undefined);
  const cap=getCapital(m.id,activeDashCasa||undefined);
  const capMeta=metaUsarDash*redsUsarDash;
  const entsM=entradas.filter(function(e){
    if(e.methodId!==m.id) return false;
    if(activeDashCasa) return e.casaId===activeDashCasa;
    return true;
  });
  const greens=entsM.filter(e=>e.result==='green').length;
  const reds_n=entsM.filter(e=>e.result==='red').length;
  const lucro=entsM.filter(e=>e.result==='green').reduce((a,e)=>a+e.profit,0);
  const perda=entsM.filter(e=>e.result==='red').reduce((a,e)=>a+e.stake,0);
  const taxa=greens+reds_n>0?((greens/(greens+reds_n))*100).toFixed(1)+'%':'—';
  const epw=globalCfg.epd*globalCfg.dpw;
  const oddMed=(mc.oddMin+mc.oddMax)/2;
  const profEst=calcProfit(metaUsarDash,oddMed,getInputMode(m));
  const sacSem=profEst*epw;
  // Casa ativa
  const casaAtiva=activeDashCasa?casaById(activeDashCasa):null;
  const p1pct=Math.min(100,Math.max(0,((stake-stakeIni)/(metaUsarDash-stakeIni))*100));
  const p2pct=Math.min(100,(cap/capMeta)*100)||0;

  const alerts=[];
  if(entradas.length===0) alerts.push({cls:'b',msg:'Bem-vindo! Configure métodos e casas, depois comece a registrar entradas.'});
  if(pendentes.length>0) alerts.push({cls:'a',msg:`${pendentes.length} entrada(s) pendente(s) aguardando resultado. <a href="#" onclick="show('pendentes')" style="color:var(--amber);text-decoration:underline;">Ver pendentes</a>`});
  if(stake>=mc.metaStake&&phase>=2&&cap===0) alerts.push({cls:'g',msg:`Meta ${fmt(mc.metaStake)} atingida no ${m.name}! Stake fixada — acumule o capital de segurança.`});
  if(phase===3) alerts.push({cls:'a',msg:`Capital completo no ${m.name}! Fase 3 ativa — lucro disponível para saque.`});
  const rc=getRedsConsec(m.id);
  if(rc>=2) alerts.push({cls:'r',msg:`${rc} reds consecutivos no ${m.name}. Atenção antes da próxima entrada.`});
  if(greens+reds_n>=5&&greens/(greens+reds_n)<0.6) alerts.push({cls:'r',msg:`Taxa de acerto abaixo de 60% no ${m.name}. Revise a seleção de jogos.`});
  // Lembrete de backup manual se auto desativado
  if(!backupCfg.auto && entradas.length>0){
    const lastBk=backupCfg.lastBackup;
    if(!lastBk){
      if(entradas.length>=5) alerts.push({cls:'a',msg:'⚠ Nenhum backup registrado. Vá em Configuração → Backup e exporte seus dados.'});
    } else {
      const lastParts=lastBk.split(',')[0].split('/');
      if(lastParts.length===3){
        const lastDate=new Date(+lastParts[2],+lastParts[1]-1,+lastParts[0]);
        const diffDays=Math.floor((new Date()-lastDate)/(1000*60*60*24));
        if(diffDays>=7) alerts.push({cls:'a',msg:'⏰ Último backup há '+diffDays+' dias. <a href="#" onclick="show(\'config\')" style="color:var(--amber);text-decoration:underline;">Fazer backup agora</a>'});
      }
    }
  }

  const allRes=METHODS_DEF.map(mm=>{
    const e=entradas.filter(x=>x.methodId===mm.id);
    const g=e.filter(x=>x.result==='green').length;
    const r=e.filter(x=>x.result==='red').length;
    const liq=e.filter(x=>x.result==='green').reduce((a,x)=>a+x.profit,0)-e.filter(x=>x.result==='red').reduce((a,x)=>a+x.stake,0);
    return {mm,g,r,liq,st:getStake(mm.id),total:e.length};
  }).filter(x=>x.total>0);

  // Resumo casas — clicável para detalhamento
  const casasHtml=casas.length?casas.map(cx=>{
    const stCx=getStake(m.id,cx.id);
    const stBaseCx=getStakeBase(m.id,cx.id);
    const metaCx=getMetaStake(m.id,cx.id);
    const pctCx=Math.min(100,Math.max(0,((stCx-stBaseCx)/(metaCx-stBaseCx))*100));
    const entsCx=entradas.filter(e=>e.methodId===m.id&&e.casaId===cx.id);
    const gCx=entsCx.filter(e=>e.result==='green').length;
    const rCx=entsCx.filter(e=>e.result==='red').length;
    const isSelCasa=(activeDashCasa===cx.id);
    return `<div onclick="showCasaDetalhe('${cx.id}')" style="cursor:pointer;background:${isSelCasa?cx.color+'25':cx.color+'10'};border:${isSelCasa?'2px solid '+cx.color:'1px solid '+cx.color+'40'};border-radius:var(--radius);padding:13px 15px;transition:all .15s;">
      <div style="font-size:10px;font-family:var(--mono);color:${cx.color};letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;">${cx.name}</div>
      <div style="font-size:18px;font-weight:600;color:${cx.color};font-family:var(--mono)">${fmt(stCx)}</div>
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:3px;">stake atual · meta ${fmt(metaCx)}</div>
      <div style="margin-top:6px;height:4px;background:var(--bg4);border-radius:99px;overflow:hidden;"><div style="height:100%;width:${pctCx.toFixed(1)}%;background:${cx.color};border-radius:99px;"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:10px;font-family:var(--mono);margin-top:3px;">
        <span style="color:var(--text3)">${pctCx.toFixed(0)}% da meta</span>
        <span><span style="color:var(--green)">${gCx}G</span> <span style="color:var(--red)">${rCx}R</span></span>
      </div>
    </div>`;
  }).join(''):'';

  // ── Cálculos de período ─────────────────────────────────────────────
  const now=new Date();
  const todayStart=startOfDay(now);
  const weekStart=startOfWeek(now);
  const monthStart=startOfMonth(now);
  // Períodos anteriores
  const yestStart=new Date(todayStart.getFullYear(),todayStart.getMonth(),todayStart.getDate()-1);
  const yestEnd=todayStart;
  const prevWeekStart=new Date(weekStart.getFullYear(),weekStart.getMonth(),weekStart.getDate()-7);
  const prevWeekEnd=weekStart;
  const prevMonthStart=new Date(monthStart.getFullYear(),monthStart.getMonth()-1,1);
  const prevMonthEnd=monthStart;

  function statsInRange(ents,from,to){
    const f=ents.filter(function(e){const d=parseDateBR(e.date);return d&&d>=from&&(!to||d<to);});
    const g=f.filter(function(e){return e.result==='green';});
    const r=f.filter(function(e){return e.result==='red';});
    const lucro=g.reduce(function(a,e){return a+e.profit;},0);
    const perda=r.reduce(function(a,e){return a+e.stake;},0);
    return {total:f.length,g:g.length,r:r.length,liq:parseFloat((lucro-perda).toFixed(2))};
  }

  // Estatísticas de todas as entradas (todas as casas e métodos)
  const statHoje=statsInRange(entradas,todayStart,null);
  const statOntem=statsInRange(entradas,yestStart,yestEnd);
  const statSemana=statsInRange(entradas,weekStart,null);
  const statPrevSemana=statsInRange(entradas,prevWeekStart,prevWeekEnd);
  const statMes=statsInRange(entradas,monthStart,null);
  const statPrevMes=statsInRange(entradas,prevMonthStart,prevMonthEnd);

  const tHoje=trendArrow(statHoje.liq,statOntem.liq);
  const tSem=trendArrow(statSemana.liq,statPrevSemana.liq);
  const tMes=trendArrow(statMes.liq,statPrevMes.liq);

  function periodCard(label,stat,trend,sub){
    const cor=stat.liq>0?'var(--green)':stat.liq<0?'var(--red)':'var(--text2)';
    const bgDot=stat.liq>0?'var(--green)':stat.liq<0?'var(--red)':'var(--text3)';
    return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;min-width:0;">'

        +'<div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;">'+label+'</div>'
        +'<span style="font-size:10px;font-family:var(--mono);color:'+( trend.cls==='g'?'var(--green)':trend.cls==='r'?'var(--red)':'var(--text3)')+';" title="'+trend.tip+'">'+trend.arrow+'</span>'
      +'</div>'
      +'<div style="font-size:22px;font-weight:600;font-family:var(--mono);color:'+cor+';margin-bottom:4px;">'+(stat.liq>=0?'+':'')+fmt(stat.liq)+'</div>'
      +'<div style="display:flex;gap:10px;font-size:11px;font-family:var(--mono);margin-bottom:6px;">'
        +'<span style="color:var(--green)">'+stat.g+'G</span>'
        +'<span style="color:var(--red)">'+stat.r+'R</span>'
        +'<span style="color:var(--text3)">'+stat.total+' entradas</span>'
      +'</div>'
      +'<div style="font-size:10px;color:var(--text3);">'+sub+'</div>'
      +'</div>';
  }

  // ── Acompanhamento semanal dia a dia ─────────────────────────────────
  // Gera os 7 dias da semana atual (seg→dom) e calcula entradas+resultado de cada
  const DIAS_SEMANA=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const diasSemanaHtml=(function(){
    const metaDiaria=globalCfg.epd;
    const totalMetaSem=metaDiaria*globalCfg.dpw;
    // Montar os 7 dias desta semana a partir do início da semana
    let diasHtml='';
    for(let d=0;d<7;d++){

      const dEnd=new Date(dStart.getFullYear(),dStart.getMonth(),dStart.getDate()+1);
      const stat=statsInRange(entradas,dStart,dEnd);
      const isFuture=dStart>now;
      const isToday=dStart.getTime()===todayStart.getTime();
      const isWeekend=(dStart.getDay()===0||dStart.getDay()===6);
      const atingiu=stat.total>=metaDiaria&&stat.total>0;
      const parcial=stat.total>0&&stat.total<metaDiaria;
      const semEntrada=!isFuture&&!isWeekend&&stat.total===0&&dStart<todayStart;
      let bg='var(--bg4)';
      let cor='var(--text3)';
      let bord='var(--border)';
      if(isToday){bord='var(--blue)';bg='rgba(79,142,247,0.08)';}
      if(atingiu){bg='var(--green-dim)';bord='var(--green-border)';cor='var(--green)';}
      else if(parcial){bg='var(--amber-dim)';bord='var(--amber-border)';cor='var(--amber)';}
      else if(semEntrada){bg='var(--red-dim)';bord='var(--red-border)';cor='var(--red)';}
      diasHtml+='<div style="flex:1;min-width:36px;border-radius:8px;border:1px solid '+bord+';background:'+bg+';padding:8px 4px;text-align:center;">'
        +'<div style="font-size:9px;font-family:var(--mono);color:'+(isToday?'var(--blue)':'var(--text3)')+';text-transform:uppercase;margin-bottom:4px;">'+DIAS_SEMANA[d]+'</div>'
        +'<div style="font-size:15px;font-weight:600;font-family:var(--mono);color:'+cor+';">'+(isFuture?'—':stat.total)+'</div>'
        +(isFuture?'':'<div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px;">'+(stat.total>0?'/ '+metaDiaria:'')+'</div>')

        +'</div>';
    }
    // Progresso semanal total
    const totalFeito=statsInRange(entradas,weekStart,null).total;
    const pctSem=Math.min(100,(totalFeito/totalMetaSem*100));
    const diasTrabalhados=Math.min(now.getDay()===0?7:Math.max(1,now.getDay()),globalCfg.dpw);
    const ritmoEsperado=diasTrabalhados*metaDiaria;
    const ritmoStatus=totalFeito>=ritmoEsperado?'no ritmo':'abaixo do ritmo';
    const ritmoColor=totalFeito>=ritmoEsperado?'var(--green)':'var(--amber)';
    return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:1.5rem;">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px;">'
        +'<div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;">Acompanhamento — semana atual</div>'
        +'<div style="display:flex;gap:10px;align-items:center;">'
          +'<span style="font-size:11px;font-family:var(--mono);color:'+ritmoColor+';">'+ritmoStatus+'</span>'
          +'<span style="font-size:11px;font-family:var(--mono);color:var(--text3);">'+totalFeito+' / '+totalMetaSem+' entradas</span>'

let casaChart=null;

function jogosParaMeta(mid,casaId){
  const metaJ=getMetaStake(mid,casaId||undefined);
  const stakeBase=getStakeBase(mid,casaId||undefined);
  const stakeJ=getStake(mid,casaId||undefined);
  const mc=mcfg(mid);
  const im=getInputMode(mById(mid));
  const oddMed=(mc.oddMin+mc.oddMax)/2;
  // Total de jogos necessários do zero (stake inicial) até meta
  let ps0=stakeBase,total=0;
  while(ps0<metaJ&&total<5000){
    const p=calcProfit(ps0,oddMed,im);
    ps0=Math.min(ps0+p,metaJ);
    total++;
  }
  if(stakeJ>=metaJ) return {faltam:0,total,feitos:total,done:true};
  // Jogos já feitos = total - faltam
  let ps=stakeJ,faltam=0;
  while(ps<metaJ&&faltam<5000){
    const p=calcProfit(ps,oddMed,im);
    ps=Math.min(ps+p,metaJ);
    faltam++;
  }
  const feitos=Math.max(0,total-faltam);
  return {faltam,total,feitos,done:false};
}

  const detalhe=document.getElementById('casa-detalhe');
  if(detalhe){detalhe.style.display='none';detalhe.dataset.casa='';}
  if(casaChart){casaChart.destroy();casaChart=null;}
  // Restaurar gráfico principal para todas as entradas do método ativo
  const m=curM();
  const mainTitle=document.querySelector('#s-dashboard .card-title:last-of-type');
  // Restaurar título
  const allTitles=document.querySelectorAll('#s-dashboard .card-title');
  if(allTitles.length){
    const last=allTitles[allTitles.length-1];
    last.innerHTML='<span class="dot"></span>Evolução da stake — '+m.name;
  }
  setTimeout(()=>renderDashChart(m.id,m.color,null,'dashChart'),50);
}

function renderDashChart(mid,color,casaId,canvasId){
  const cid=canvasId||'dashChart';
  // Filtro estrito por casa
  const ents=entradas.filter(function(e){
    if(e.methodId!==mid) return false;
    if(casaId) return e.casaId===casaId;
    return true; // gráfico geral: todas as entradas do método
  });
  const canvas=document.getElementById(cid);
  if(!canvas) return;
  // Destruir chart anterior no canvas correto
  if(cid==='dashChart'){if(dashChart){dashChart.destroy();dashChart=null;}}
  else{if(casaChart){casaChart.destroy();casaChart=null;}}
  if(ents.length<2){canvas.parentElement.innerHTML='<div class="empty" style="font-size:11px;padding:1rem;">// registre pelo menos 2 entradas para ver o gráfico</div>';return;}
  const meta=getMetaStake(mid,casaId||undefined);
  const chartObj=new Chart(canvas,{
    data:{labels:ents.map((_,i)=>'#'+(i+1)),datasets:[
      {type:'line',label:'Stake',data:ents.map(e=>e.stakeAfter),borderColor:color,backgroundColor:color+'15',fill:true,borderWidth:2,pointRadius:ents.length>30?2:5,pointBackgroundColor:ents.map(e=>e.result==='green'?color:'#f25757'),tension:0.4,order:1},
      {type:'line',label:'Meta',data:Array(ents.length).fill(meta),borderColor:'#f25757',backgroundColor:'transparent',borderWidth:1,borderDash:[5,5],pointRadius:0,order:2},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2026',titleColor:'#9299a8',bodyColor:'#f0f0f0',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.parsed.y)}}},
      scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#5a6070',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#5a6070',font:{size:10},callback:v=>'R$'+Math.round(v).toLocaleString('pt-BR')}}}}
  });
  if(cid==='dashChart') dashChart=chartObj; else casaChart=chartObj;
}

function addCasa(){
  const name=(document.getElementById('nova-casa-name').value||'').trim();
  if(!name){alert('Informe o nome da casa.');return;}
  const banca=parseFloat(document.getElementById('nova-casa-banca').value)||0;
  const color=document.getElementById('nova-casa-cor').value||'#94a3b8';
  casas.push({id:'casa_'+Date.now(),name,banca,color});
  persist();renderCasas();renderDash();
  document.getElementById('nova-casa-name').value='';
  const m=document.getElementById('casa-msg');if(m){m.textContent='// casa adicionada';setTimeout(()=>{if(m)m.textContent='';},2000);}

function removeCasa(i){
  if(!confirm('Remover esta casa?')) return;
  casas.splice(i,1);persist();renderCasas();renderDash();
}

function notaSearchInput(){
  const q=(document.getElementById('ent-nota-search').value||'').toLowerCase().trim();
  const res=document.getElementById('ent-nota-results');
  if(!res) return;
  if(!q){res.style.display='none';return;}
  const matches=notas.filter(function(n){
    return (n.title||'').toLowerCase().includes(q)
      || (n.body||'').toLowerCase().includes(q)
      || (n.tags||[]).some(function(t){return t.toLowerCase().includes(q);});
  }).slice(0,8);
  if(!matches.length){
    res.style.display='block';
    res.innerHTML='<div style="padding:10px 14px;font-size:12px;color:var(--text3);font-family:var(--mono);">// nenhuma nota encontrada</div>';
    return;
  }
  res.style.display='block';
  res.innerHTML=matches.map(function(n){
    const catColor=CAT_COLORS[n.cat||'outro']||'#94a3b8';
    return '<div onclick="selectNotaLink(\''+n.id+'\')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;">'
      +'<div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px;">'+n.title+'</div>'
      +'<div style="display:flex;gap:6px;align-items:center;">'
        +'<span style="font-size:10px;font-family:var(--mono);color:'+catColor+';">'+( CAT_LABELS[n.cat||'outro']||n.cat)+'</span>'
        +((n.tags||[]).length?n.tags.slice(0,3).map(function(t){return '<span style="font-size:9px;color:var(--text3);font-family:var(--mono);">#'+t+'</span>';}).join(' '):'')
      +'</div>'
    +'</div>';
  }).join('');
}

function selectNotaLink(id){
  const nota=notas.find(function(n){return n.id===id;});
  if(!nota) return;
  document.getElementById('ent-nota-id').value=id;
  document.getElementById('ent-nota-search').value='';
  document.getElementById('ent-nota-results').style.display='none';
  const sel=document.getElementById('ent-nota-sel');
  const lbl=document.getElementById('ent-nota-sel-label');
  if(sel&&lbl){
    sel.style.display='flex';
    lbl.textContent='📎 '+nota.title;
  }
  // Close results on click outside
  document.addEventListener('click',function closeRes(e){
    const r=document.getElementById('ent-nota-results');
    if(r&&!r.contains(e.target)) r.style.display='none';
    document.removeEventListener('click',closeRes);
  });
}

function clearNotaLink(){
  const id=document.getElementById('ent-nota-id');
  const sel=document.getElementById('ent-nota-sel');
  const lbl=document.getElementById('ent-nota-sel-label');
  const inp=document.getElementById('ent-nota-search');
  if(id) id.value='';
  if(sel) sel.style.display='none';
  if(lbl) lbl.textContent='';
  if(inp) inp.value='';
}

  const im=getInputMode(m);

  const obs=(document.getElementById('ent-obs').value||'').trim();
  const casaId=document.getElementById('ent-casa')?document.getElementById('ent-casa').value||'':'';
  const stakeBase=getStake(m.id,casaId);
  const stakeBase0=getStakeBase(m.id,casaId);
  const entradaInput=parseFloat(document.getElementById('ent-stake').value)||stakeBase;
  const under25=parseFloat(document.getElementById('ent-under25')?document.getElementById('ent-under25').value:'')||null;
  const desfal=(document.getElementById('ent-desfal')?document.getElementById('ent-desfal').value||'':'').trim();
  const notaId=(document.getElementById('ent-nota-id')?document.getElementById('ent-nota-id').value||'':'');
  return {m,mc,im,odd,obs,stakeBase,stakeBase0,entradaInput,casaId,under25,desfal,notaId};
}

function reg(result){
  const {m,mc,im,odd,obs,stakeBase,entradaInput,casaId,under25,desfal}=getEntInputs();
  if(!odd||odd<=1){const el=document.getElementById('ent-msg');el.style.color='var(--red)';el.textContent='⚠ Informe a odd desta entrada.';return;}
  const phase=getPhase(m.id,casaId);
  const profit=calcProfit(entradaInput,odd,im);
  const metaCasa=getMetaStake(m.id,casaId);
  let stakeAfter=phase===1?(result==='green'?Math.min(entradaInput+profit,metaCasa):stakeBase0):metaCasa;
  entradas.push({
    id:Date.now(),date:new Date().toLocaleString('pt-BR'),
    methodId:m.id,methodName:m.name,type:m.type,inputMode:im,phase,
    stake:parseFloat(entradaInput.toFixed(2)),odd,
    profit:parseFloat(profit.toFixed(2)),
    result,stakeAfter:parseFloat(stakeAfter.toFixed(2)),
    obs,casaId,under25,desfal,notaId
  });
  persist();
  // Sons e notificações
  const redsC=getRedsConsec(m.id,casaId);
  triggerResultAlert(result, redsC);

  const el=document.getElementById('ent-msg');
  el.style.color=result==='green'?'var(--green)':'var(--red)';
  el.textContent=result==='green'?`✓ Green! Lucro: +${fmt(profit)} | Nova resp/stake: ${fmt(stakeAfter)}`:`✗ Red. Stake/Resp resetada para ${fmt(stakeAfter)}`;
  document.getElementById('ent-odd').value='';document.getElementById('ent-stake').value='';
  document.getElementById('ent-obs').value='';document.getElementById('ent-prev').textContent='';

  if(document.getElementById('ent-desfal')) document.getElementById('ent-desfal').value='';
  clearNotaLink();
  renderAll();
}

// ─── PENDENTES ─────────────────────────────────────────────────────────────

          +'<span class="badge pend">PENDENTE</span>'

        +(p.under25?'<div style="font-size:11px;color:var(--purple);font-family:var(--mono);margin-top:2px;">Under 2.5: '+p.under25+'</div>':'')
        +(p.desfal?'<div style="font-size:11px;color:var(--text3);margin-top:2px;">'+p.desfal+'</div>':'')

function startMonitorById(btn){
  var pid=btn.getAttribute('data-pid');
  var url=btn.getAttribute('data-url');
  startMonitor(pid,url);
}
function startMonitor(pendId, googleUrl){
  if(pendMonitor[pendId]&&pendMonitor[pendId].interval) return;
  const INTERVAL_MS = 5*60*1000; // 5 minutos
  const nextAt = Date.now()+INTERVAL_MS;
  pendMonitor[pendId]={interval:null, nextAt, count:0};

  // Abre imediatamente na primeira vez
  abrirPlacar(pendId, googleUrl);

  // Agenda próximas aberturas a cada 5 min
  pendMonitor[pendId].interval = setInterval(function(){
    pendMonitor[pendId].count++;
    pendMonitor[pendId].nextAt = Date.now()+INTERVAL_MS;
    abrirPlacar(pendId, googleUrl);
  }, INTERVAL_MS);

  // Ticker visual a cada segundo
  pendMonitor[pendId].ticker = setInterval(function(){
    updateCountdown(pendId);
  }, 1000);

  renderPendentes();
}

function stopMonitor(pendId){
  if(pendMonitor[pendId]){
    clearInterval(pendMonitor[pendId].interval);
    clearInterval(pendMonitor[pendId].ticker);
    delete pendMonitor[pendId];
  }
  renderPendentes();
}

function abrirPlacar(pendId, googleUrl){
  // Abre nova aba com o placar
  window.open(googleUrl,'_blank','noopener');
  playSound('warn');
  const p=pendentes.find(function(x){return String(x.id)===String(pendId);});
  const nome=p&&p.obs?p.obs:'jogo pendente';
  showBackupToast('🔍 Placar aberto: '+nome+' — volte aqui e informe o placar');
  // Mostra campo de placar inline na tela de pendentes
  showPlacarInput(pendId);
}

    +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">'

        +' style="width:100px;padding:7px 10px;font-size:14px;font-weight:600;font-family:var(--mono);border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);text-align:center;"'

function calcPlacarSugestao(pendId){
  const inp=document.getElementById('placar-val-'+pendId);
  const sug=document.getElementById('placar-sug-'+pendId);
  const btns=document.getElementById('placar-btns-'+pendId);
  if(!inp||!sug||!btns) return;

  const val=inp.value.trim();
  if(!val){sug.textContent='';btns.style.display='none';return;}

  // Parse do placar: aceita "1-0", "1 0", "1x0"
  const parts=val.replace(/[x\s]/g,'-').split('-');
  const g1=parseInt(parts[0]);
  const g2=parseInt(parts[1]);

  const p=pendentes.find(function(x){return String(x.id)===String(pendId);});
  if(!p||isNaN(g1)||isNaN(g2)){
    sug.style.color='var(--text3)';
    sug.textContent='formato: gols_casa - gols_fora (ex: 1-0)';
    btns.style.display='none';
    return;
  }

  // Determina sugestão baseada no método
  const mid=p.methodId;
  let sugestao='';
  let corSug='var(--text3)';

  if(mid==='lay01'){
    // Lay 0x1 — GREEN se placar final NÃO for 0x1
    if(g1===0&&g2===1){sugestao='→ Resultado 0x1 = RED ✗';corSug='var(--red)';}
    else{sugestao='→ Não terminou 0x1 = GREEN ✓';corSug='var(--green)';}
  } else if(mid==='lay10'){
    if(g1===1&&g2===0){sugestao='→ Resultado 1x0 = RED ✗';corSug='var(--red)';}
    else{sugestao='→ Não terminou 1x0 = GREEN ✓';corSug='var(--green)';}
  } else if(mid==='layemp'){
    if(g1===g2){sugestao='→ Empate = RED ✗';corSug='var(--red)';}
    else{sugestao='→ Não empatou = GREEN ✓';corSug='var(--green)';}
  } else if(mid==='layover'||mid==='over25'){
    const total=g1+g2;
    if(total>2){sugestao='→ Mais de 2.5 gols = RED ✗';corSug='var(--red)';}
    else{sugestao='→ 2.5 gols ou menos = GREEN ✓';corSug='var(--green)';}
  } else if(mid==='layunder'||mid==='afrente'){
    const total2=g1+g2;
    if(total2<=2){sugestao='→ 2.5 gols ou menos = RED ✗';corSug='var(--red)';}
    else{sugestao='→ Mais de 2.5 gols = GREEN ✓';corSug='var(--green)';}
  } else {
    // Método personalizado — só mostra placar
    sugestao='Placar: '+g1+' x '+g2+' — escolha o resultado manualmente';
  }

  sug.style.color=corSug;
  sug.textContent=sugestao;

  // Botões de confirmação
  const isGreen=sugestao.includes('GREEN');
  const isRed=sugestao.includes('RED');
  const pendIdx=pendentes.findIndex(function(x){return String(x.id)===String(pendId);});

  btns.style.display='flex';
  btns.innerHTML=(isGreen
    ?'<button onclick="confirmPlacarBtn(this)" data-idx="'+pendIdx+'" data-res="green" data-pl="'+val+'" class="btn g" style="font-size:12px;font-weight:700;">✓ Confirmar GREEN</button>'
    :'')
  +(isRed
    ?'<button onclick="confirmPlacarBtn(this)" data-idx="'+pendIdx+'" data-res="red" data-pl="'+val+'" class="btn r" style="font-size:12px;font-weight:700;">✗ Confirmar RED</button>'
    :'')
  +'<button onclick="confirmPlacarBtn(this)" data-idx="'+pendIdx+'" data-res="green" data-pl="'+val+'" class="btn g" style="font-size:11px;">✓ Green</button>'
  +'<button onclick="confirmPlacarBtn(this)" data-idx="'+pendIdx+'" data-res="red" data-pl="'+val+'" class="btn r" style="font-size:11px;">✗ Red</button>';

  // Remove duplicatas se já tem os botões principais
  if(isGreen||isRed){
    btns.innerHTML=(isGreen
      ?'<button onclick="confirmPlacarBtn(this)" data-idx="'+pendIdx+'" data-res="green" data-pl="'+val+'" class="btn g" style="font-size:13px;padding:7px 18px;font-weight:700;">✓ Confirmar GREEN</button>'
      :'<button onclick="confirmPlacarBtn(this)" data-idx="'+pendIdx+'" data-res="green" data-pl="'+val+'" class="btn g" style="font-size:11px;">✓ Green</button>')
    +(isRed
      ?'<button onclick="confirmPlacarBtn(this)" data-idx="'+pendIdx+'" data-res="red" data-pl="'+val+'" class="btn r" style="font-size:13px;padding:7px 18px;font-weight:700;">✗ Confirmar RED</button>'
      :'<button onclick="confirmPlacarBtn(this)" data-idx="'+pendIdx+'" data-res="red" data-pl="'+val+'" class="btn r" style="font-size:11px;">✗ Red</button>');
  }
}

function confirmPlacarBtn(btn){
  var idx=parseInt(btn.getAttribute('data-idx'));
  var result=btn.getAttribute('data-res');
  var placar=btn.getAttribute('data-pl')||'';
  confirmPlacar(idx,result,placar);
}
function confirmPlacar(idx, result, placar){
  // Adiciona o placar na observação
  if(pendentes[idx]) pendentes[idx].obs=(pendentes[idx].obs||'')+(placar?' ['+placar+']':'');
  resolvePend(idx, result);
}

function updateCountdown(pendId){
  const mon=pendMonitor[pendId];
  const el=document.getElementById('pend-cd-'+pendId);
  if(!mon||!el) return;
  const diff=Math.max(0, Math.ceil((mon.nextAt-Date.now())/1000));
  const mm=String(Math.floor(diff/60)).padStart(2,'0');
  const ss=String(diff%60).padStart(2,'0');
  el.textContent='Próxima busca em '+mm+':'+ss+(mon.count>0?' · '+mon.count+' abertura(s) feita(s)':'');
}

function resolvePend(i,result){
  const p=pendentes[i];
  const m=mById(p.methodId);const mc=mcfg(p.methodId);
  const im=p.inputMode||'responsabilidade';
  const phase=getPhase(p.methodId,p.casaId);
  const profit=calcProfit(p.stake,p.odd,im);
  const resetStake=getStakeBase(p.methodId,p.casaId);
  const metaResol=getMetaStake(p.methodId,p.casaId);
  let stakeAfter=phase===1?(result==='green'?Math.min(p.stake+profit,metaResol):resetStake):metaResol;
  // Sons e notificações ao resolver pendente
  const redsCP=getRedsConsec(p.methodId,p.casaId);
  triggerResultAlert(result, result==='red'?redsCP+1:0);

  entradas.push({
    id:p.id,date:p.date,resolvedDate:new Date().toLocaleString('pt-BR'),
    methodId:p.methodId,methodName:p.methodName,type:p.type,inputMode:im,phase,
    stake:p.stake,odd:p.odd,profit:parseFloat(profit.toFixed(2)),
    result,stakeAfter:parseFloat(stakeAfter.toFixed(2)),
    obs:p.obs,casaId:p.casaId,under25:p.under25,desfal:p.desfal,
    wasPending:true
  });
  if(p&&pendMonitor[p.id]) stopMonitor(p.id);
  pendentes.splice(i,1);
  persist();renderAll();
}

function removePend(i){
  if(confirm('Remover esta entrada pendente?')){
    const p=pendentes[i];
    if(p&&pendMonitor[p.id]) stopMonitor(p.id);
    pendentes.splice(i,1);
    persist();renderPendentes();updatePendBadge();
  }
}

// ─── HISTÓRICO ─────────────────────────────────────────────────────────────
function renderHistorico(){
  // Filtragem dupla: método + casa
  let filtered = entradas;
  if(activeHistMethod !== 'all') filtered = filtered.filter(e=>e.methodId===activeHistMethod);
  if(activeHistCasa === 'none') filtered = filtered.filter(e=>!e.casaId||e.casaId==='');
  else if(activeHistCasa !== 'all') filtered = filtered.filter(e=>e.casaId===activeHistCasa);

  const g=filtered.filter(e=>e.result==='green').length;
  const r=filtered.filter(e=>e.result==='red').length;
  const lucro=filtered.filter(e=>e.result==='green').reduce((a,e)=>a+e.profit,0);
  const perda=filtered.filter(e=>e.result==='red').reduce((a,e)=>a+e.stake,0);
  const taxa=g+r>0?((g/(g+r))*100).toFixed(1):0;
  const oddsHist=filtered.map(e=>e.odd);
  const oddMedia=oddsHist.length>0?(oddsHist.reduce((a,b)=>a+b,0)/oddsHist.length).toFixed(2):null;

  // Casa e método ativos para barra de progresso (só se ambos filtrados)
  const midActive = activeHistMethod==='all'?null:activeHistMethod;
  const casaActive = activeHistCasa==='all'?null:activeHistCasa;
  const mActive = midActive?mById(midActive):null;
  const mcActive = midActive?mcfg(midActive):null;
  const casaActiveObj = casaActive?casaById(casaActive):null;

  // Stake/fase usando filtro duplo (método+casa)
  const stakeAtual = midActive?getStake(midActive, casaActive||undefined):null;
  const capAtual = midActive?getCapital(midActive, casaActive||undefined):null;
  const metaHist = midActive?getMetaStake(midActive, casaActive||undefined):null;
  const redsHist = midActive?getRedsCobrir(midActive, casaActive||undefined):null;
  const capMeta = (metaHist&&redsHist)?metaHist*redsHist:null;
  const p1pct = (mcActive&&stakeAtual!=null&&metaHist&&metaHist>mcActive.stake0)?Math.min(100,Math.max(0,((stakeAtual-mcActive.stake0)/(metaHist-mcActive.stake0))*100)):null;
  const p2pct = (mcActive&&capAtual!=null&&capMeta)?Math.min(100,(capAtual/capMeta)*100)||0:null;
  const phaseAtual = midActive?getPhase(midActive, casaActive||undefined):null;

  let html='';

  if(mcActive){
    const faltaStake=metaHist&&stakeAtual!=null?Math.max(0,metaHist-stakeAtual):0;
    const faltaCap=capMeta&&capAtual!=null?Math.max(0,capMeta-capAtual):0;
    const corProg = casaActiveObj?casaActiveObj.color:mActive.color;
    html+=`<div class="card" style="border-left:3px solid ${corProg};">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
        <div style="width:8px;height:8px;border-radius:50%;background:${mActive.color}"></div>
        <span style="font-size:14px;font-weight:600;color:${mActive.color}">${mActive.name}</span>
        ${casaActiveObj?`<span style="background:${casaActiveObj.color}20;color:${casaActiveObj.color};border:1px solid ${casaActiveObj.color}50;border-radius:99px;font-size:11px;font-family:var(--mono);padding:2px 9px;">${casaActiveObj.name}</span>`:''}
        <span style="margin-left:auto">${phBadge(phaseAtual)}</span>
      </div>
      <div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
          <span style="font-size:12px;color:var(--text2)">Fase 1 — Stake: <strong style="color:${corProg};font-family:var(--mono)">${fmt(stakeAtual)}</strong> / ${fmt(metaHist)}</span>

function runSim(){
  const el=document.getElementById('sim-result');if(!el) return;
  const n=parseInt(document.getElementById('sim-n')?.value)||5;
  const odd=parseFloat(document.getElementById('sim-odd')?.value)||3.4;
  const stakeIni=parseFloat(document.getElementById('sim-stake')?.value)||150;
  const mode=document.getElementById('sim-mode')?.value||'responsabilidade';
  const meta=parseFloat(document.getElementById('sim-meta')?.value)||1000;
  if(odd<=1||n<1||stakeIni<0.01){el.innerHTML='<div class="empty">// preencha os campos acima</div>';return;}
  const isLay=mode==='responsabilidade';
  let stake=stakeIni,totalLucro=0;const rows=[];
  for(let i=1;i<=n;i++){
    const lucroJogo=isLay?parseFloat((stake/(odd-1)).toFixed(2)):parseFloat((stake*(odd-1)).toFixed(2));
    const novaStake=parseFloat(Math.min(stake+lucroJogo,meta).toFixed(2));
    const pct=Math.min(100,((novaStake-stakeIni)/(meta-stakeIni))*100);
    totalLucro=parseFloat((totalLucro+lucroJogo).toFixed(2));
    rows.push({jogo:i,stakeAnt:stake,lucro:lucroJogo,stakeNova:novaStake,pct:pct.toFixed(1),metaAting:novaStake>=meta});
    stake=novaStake>=meta?meta:novaStake;
  }
  const metaJogo=rows.find(r=>r.metaAting);
  const pctFinal=Math.min(100,((stake-stakeIni)/(meta-stakeIni))*100);
  let html=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:12px;">
    <div class="mc accent-g"><div class="ml">Lucro total</div><div class="mv g mv-sm">+${fmt(totalLucro)}</div></div>
    <div class="mc"><div class="ml">Stake final</div><div class="mv mv-sm" style="font-family:var(--mono);color:${stake>=meta?'var(--green)':'var(--text)'}">${fmt(stake)}</div></div>
    <div class="mc"><div class="ml">Lucro médio/jogo</div><div class="mv g mv-sm">+${fmt(totalLucro/n)}</div></div>
    ${metaJogo?`<div class="mc accent-g"><div class="ml">Meta no jogo</div><div class="mv g mv-sm">#${metaJogo.jogo} ✓</div></div>`:''}
  </div>
  <div style="margin-bottom:14px;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
      <span style="font-size:12px;color:var(--text2)">Progresso após ${n} jogos</span>
      <span style="font-size:16px;font-weight:700;font-family:var(--mono);color:${stake>=meta?'var(--green)':'var(--amber)'}">${pctFinal.toFixed(1)}%</span>
    </div>
    <div class="pbar" style="height:12px;"><div class="pfill ${stake>=meta?'g':'a'}" style="width:${pctFinal.toFixed(1)}%"></div></div>
  </div>
  <div class="tw"><table><thead><tr><th>Jogo</th><th>${isLay?'Resp':'Stake'}</th><th>Odd</th><th>Lucro</th><th>Nova stake</th><th>% meta</th><th>Status</th></tr></thead><tbody>`;
  rows.forEach(row=>{
    html+=`<tr ${row.metaAting?'style="background:rgba(34,211,160,0.06)"':''}>
      <td style="font-family:var(--mono);color:var(--text3)">#${row.jogo}</td>
      <td style="font-family:var(--mono)">${fmt(row.stakeAnt)}</td>
      <td style="font-family:var(--mono)">${odd}</td>
      <td style="font-family:var(--mono);color:var(--green);font-weight:600">+${fmt(row.lucro)}</td>
      <td style="font-family:var(--mono);font-weight:600;color:${row.metaAting?'var(--green)':'var(--text)'}">${fmt(row.stakeNova)}</td>
      <td><div style="display:flex;align-items:center;gap:6px;"><div style="flex:1;background:var(--bg4);border-radius:99px;height:5px;min-width:60px;overflow:hidden;"><div style="height:100%;border-radius:99px;background:${parseFloat(row.pct)>=100?'var(--green)':'var(--amber)'};width:${row.pct}%"></div></div><span style="font-family:var(--mono);font-size:11px">${row.pct}%</span></div></td>
      <td>${row.metaAting?'<span class="badge g">META ✓</span>':'—'}</td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  el.innerHTML=html;
}

// ── Helper: odd média real de um conjunto de entradas ──────────────────────
function oddMediaReal(ents){
  if(!ents||!ents.length) return null;
  return parseFloat((ents.reduce(function(a,e){return a+e.odd;},0)/ents.length).toFixed(2));
}

// ── Helper: projeção com uma odd específica ─────────────────────────────────
function calcProjComOdd(stake,metaUsar,redsUsar,epw,odd,im,cap){
  const pE=function(s){return calcProfit(s,odd,im);};
  let ps=stake,entries=0,wkRows=[];
  while(ps<metaUsar&&wkRows.length<40){
    for(let i=0;i<epw;i++){const p=pE(Math.min(ps,metaUsar));if(ps<metaUsar)ps=Math.min(ps+p,metaUsar);}
    entries+=epw;wkRows.push({w:wkRows.length+1,st:parseFloat(ps.toFixed(2)),ph:1});
  }
  const weeksP1=wkRows.length;
  const profFixed=pE(metaUsar);
  const profWeek=profFixed*epw;
  const capFalta=Math.max(0,(metaUsar*redsUsar)-cap);
  const wksP2=Math.ceil(capFalta/(profWeek||1));
  return {entries,weeksP1,wksP2,profFixed,profWeek,wkRows};
}

function showProj(mid, casaId){
  const m=mById(mid);const mc=mcfg(mid);
  const cx=casaId?casaById(casaId):null;
  const metaUsar=getMetaStake(mid,casaId||undefined);
  const redsUsar=getRedsCobrir(mid,casaId||undefined);
  const stakeBase=getStakeBase(mid,casaId||undefined);
  const stake=getStake(mid,casaId||undefined);
  const cap=getCapital(mid,casaId||undefined);
  const epw=globalCfg.epd*globalCfg.dpw;
  const im=getInputMode(m);

  // ── Odds: configurada vs real ─────────────────────────────────────────────
  const oddConfMin=mc.oddMin;
  const oddConfMax=mc.oddMax;
  const oddConfMedia=(oddConfMin+oddConfMax)/2;

  // Entradas reais desta combinação método+casa
  const entsReais=entradas.filter(function(e){
    if(e.methodId!==mid) return false;
    if(casaId) return e.casaId===casaId;
    return true;
  });
  const oddReal=oddMediaReal(entsReais);
  const oddParaProj=oddReal||oddConfMedia; // usa real se disponível, senão configurada

  // ── Projeção com odd configurada ──────────────────────────────────────────
  const projConf=calcProjComOdd(stake,metaUsar,redsUsar,epw,oddConfMedia,im,cap);
  // ── Projeção com odd real (se disponível) ─────────────────────────────────
  const projReal=oddReal?calcProjComOdd(stake,metaUsar,redsUsar,epw,oddReal,im,cap):null;

  // Usa odd real para os cards principais se disponível
  const proj=projReal||projConf;
  const {entries,weeksP1,wksP2,profFixed,profWeek,wkRows}=proj;
  const capMeta=metaUsar*redsUsar;

  // ── Comparação por casa ───────────────────────────────────────────────────
  const casasComEnts=casas.filter(function(c2){return entradas.some(function(e){return e.methodId===mid&&e.casaId===c2.id;});});
  const oddPorCasa=casasComEnts.map(function(c2){
    const entsC=entradas.filter(function(e){return e.methodId===mid&&e.casaId===c2.id;});
    const oReal=oddMediaReal(entsC);
    const metaC=getMetaStake(mid,c2.id);
    const redsC=getRedsCobrir(mid,c2.id);
    const stakeC=getStake(mid,c2.id);
    const capC=getCapital(mid,c2.id);
    const projC=oReal?calcProjComOdd(stakeC,metaC,redsC,epw,oReal,im,capC):null;
    const projCconf=calcProjComOdd(stakeC,metaC,redsC,epw,(mc.oddMin+mc.oddMax)/2,im,capC);
    return {c2,oReal,entsCount:entsC.length,projC,projCconf,stakeC,metaC};
  });

  const corLabel=cx?cx.color:m.color;
  const labelExtra=cx?'<span style="background:'+cx.color+'20;color:'+cx.color+';border:1px solid '+cx.color+'50;border-radius:99px;font-size:11px;font-family:var(--mono);padding:2px 9px;margin-left:4px;">'+cx.name+'</span>':'';

  // ── Bloco de comparação odd configurada vs real ───────────────────────────
  const diffOdd=oddReal?(oddReal-oddConfMedia):null;
  const diffJogos=oddReal&&projReal?(projConf.entries-projReal.entries):null;
  const oddCompHtml=oddReal
    ?'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;">'
      +'<div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Odd configurada vs odd real</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px;">'
        +'<div class="mc"><div class="ml">Odd configurada (média)</div><div class="mv mv-sm" style="font-family:var(--mono)">'+oddConfMedia.toFixed(2)+'</div><div style="font-size:10px;color:var(--text3);margin-top:2px;">faixa '+oddConfMin+' – '+oddConfMax+'</div></div>'
        +'<div class="mc '+(oddReal>=oddConfMedia?'accent-g':'accent-r')+'"><div class="ml">Odd real (média histórica)</div><div class="mv mv-sm '+(oddReal>=oddConfMedia?'g':'r')+'" style="font-family:var(--mono)">'+oddReal+'</div><div style="font-size:10px;color:var(--text3);margin-top:2px;">'+entsReais.length+' entradas reais</div></div>'
        +'<div class="mc '+(diffOdd>=0?'accent-g':'accent-r')+'"><div class="ml">Diferença</div><div class="mv mv-sm '+(diffOdd>=0?'g':'r')+'" style="font-family:var(--mono)">'+(diffOdd>=0?'+':'')+diffOdd.toFixed(2)+'</div><div style="font-size:10px;color:var(--text3);margin-top:2px;">'+(diffOdd>0?'odd real acima — lucro/entrada maior':'odd real abaixo — lucro/entrada menor')+'</div></div>'
        +(diffJogos!==null?'<div class="mc '+(diffJogos>0?'accent-g':'accent-r')+'"><div class="ml">Impacto nos jogos</div><div class="mv mv-sm '+(diffJogos>0?'g':'r')+'" style="font-family:var(--mono)">'+(diffJogos>0?'-':'+')+(Math.abs(diffJogos))+' jogos</div><div style="font-size:10px;color:var(--text3);margin-top:2px;">'+(diffJogos>0?'chega na meta mais rápido':'chega na meta mais devagar')+'</div></div>':'')
      +'</div>'
      // Tabela comparativa: com odd configurada vs com odd real
      +'<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;">'
        +'<thead><tr>'
          +'<th style="text-align:left;padding:6px 8px;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono);text-transform:uppercase;"></th>'

          var jogosCapital=profFixed>0?Math.ceil(capMeta/profFixed):0;

          // Fase 3: primeiro saque
          var diasCorridosFase3=diasCorridosFase1+diasCorridosFase2;
          // Datas
          function addDias(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}

          return '<div class="mc" style="border-left:3px solid var(--green);grid-column:span 2;">'

            +'<div class="ml">Progresso — fase 1 (stake) · fase 2 (capital) · fase 3 (saques)</div>'
            +'<div style="display:flex;align-items:baseline;gap:8px;margin:6px 0 4px;">'
              +'<span style="font-size:26px;font-weight:700;font-family:var(--mono);color:var(--green);">'+jogosFeitos+'</span>'
              +'<span style="font-size:14px;color:var(--text3);font-family:var(--mono);">/ '+entries+' jogos (fase 1)</span>'
              +'<span style="font-size:11px;color:var(--amber);font-family:var(--mono);margin-left:auto;">faltam '+faltamJogos+'</span>'
            +'</div>'
            +'<div style="height:8px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-bottom:10px;">'
              +'<div style="height:100%;width:'+pctJogos.toFixed(1)+'%;background:var(--green);border-radius:99px;transition:width .5s;"></div>'
            +'</div>'
            +'<div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:8px;">'+pctJogos.toFixed(1)+'% da fase 1 concluído · ritmo configurado: '+epd+'/dia × '+dpw+'d/semana = '+epd*dpw+' entradas/semana</div>'
            // 3 cards de fase
            +'<div style="display:flex;gap:8px;flex-wrap:wrap;">'
              +faseCard('var(--green)','1','Meta de stake',fmtData(dataFase1),diasCorridosFase1,semanasFase1,faltamJogos+' jogos faltam')
              +faseCard('var(--blue)','2','Capitalização',fmtData(dataFase2),diasCorridosFase2,semanasFase2,jogosCapital+' jogos · '+fmt(capMeta))
              +faseCard('var(--amber)','3','Início de saques',fmtData(dataFase2),diasCorridosFase3,semanasFase1+semanasFase2,fmt(profWeek)+'/semana')
            +'</div>'
          +'</div>';
        })()
      +'</div>';
    })()
    +casasCompHtml
    +'<div class="sec">Semana a semana'+(oddReal?' (com odd real '+oddReal+')':'')+'</div>'
    +'<div class="tw"><table><thead><tr><th>Semana</th><th>Stake</th><th>Lucro semanal</th><th>Fase</th></tr></thead><tbody>'
    +wkRows.map(function(d){return '<tr><td style="font-family:var(--mono);color:var(--text3)">'+d.w+'</td><td style="font-family:var(--mono);font-weight:600;color:'+(d.ph===1?'var(--green)':d.ph===2?'var(--blue)':'var(--amber)')+'">'+fmt(d.st)+'</td><td style="font-family:var(--mono);color:var(--green)">+'+fmt(profWeek)+'</td><td>'+phBadge(d.ph)+'</td></tr>';}).join('')
    +'</tbody></table></div>'
