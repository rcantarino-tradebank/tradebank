// ─── BASE DE CONHECIMENTO ──────────────────────────────────────────────────
const CAT_LABELS={estrategia:'Estratégia',analise:'Análise',regra:'Regra de entrada',desfalque:'Desfalques',jogo:'Jogo específico',outro:'Outro'};
const CAT_COLORS={estrategia:'#22d3a0',analise:'#4f8ef7',regra:'#f5a623',desfalque:'#a78bfa',jogo:'#f25757',outro:'#94a3b8'};

function renderNotas(searchTerm=''){
  const q=(searchTerm||'').toLowerCase();
  const filtered=q?notas.filter(n=>(n.title+n.body+(n.tags||[]).join(' ')+(n.cat||'')).toLowerCase().includes(q)):notas;
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
    <span style="font-size:13px;color:var(--text2)">${notas.length} nota(s) salva(s)</span>
    <button class="btn b" onclick="openNoteModal()">+ Nova nota</button>
  </div>
  <input type="text" class="note-search" placeholder="Buscar em títulos, conteúdo, tags..." oninput="renderNotas(this.value)" value="${searchTerm}">`;

  if(!filtered.length){
    html+='<div class="empty">// '+(q?'nenhum resultado para "'+q+'"':'nenhuma nota ainda — crie a primeira!')+'</div>';
    document.getElementById('s-notas').innerHTML=html;return;
  }

  // Agrupado por categoria
  const cats=[...new Set(filtered.map(n=>n.cat||'outro'))];
  cats.forEach(cat=>{
    const catNotes=filtered.filter(n=>(n.cat||'outro')===cat);
    const col=CAT_COLORS[cat]||'#94a3b8';
    html+=`<div style="margin-bottom:16px;">
      <div style="font-size:10px;font-family:var(--mono);color:${col};text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">${CAT_LABELS[cat]||cat} (${catNotes.length})</div>
      ${catNotes.map(n=>`
        <div class="note-card" onclick="openNoteModal('${n.id}')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div class="note-title">${n.title||'Sem título'}</div>
            <span style="font-size:10px;font-family:var(--mono);color:var(--text3);flex-shrink:0">${n.date||''}</span>
          </div>
          <div class="note-body" style="-webkit-line-clamp:3;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;">${n.body||''}</div>
          ${(n.tags||[]).length?`<div class="note-tags">${n.tags.map(t=>`<span class="note-tag">#${t.trim()}</span>`).join('')}</div>`:''}
          ${(function(){
            const linked=entradas.filter(function(e){return e.notaId===n.id;});
            if(!linked.length) return '';
            const g=linked.filter(function(e){return e.result==='green';}).length;
            const r=linked.length-g;
            const taxa=((g/linked.length)*100).toFixed(0);
            return '<div style="margin-top:6px;padding:6px 8px;background:var(--purple-dim);border:1px solid rgba(167,139,250,0.25);border-radius:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
              +'<span style="font-size:10px;color:var(--purple);font-family:var(--mono);">📎 '+linked.length+' entrada'+(linked.length>1?'s':'')+'</span>'
              +'<span style="font-size:10px;color:var(--green);font-family:var(--mono);">'+g+'G</span>'
              +'<span style="font-size:10px;color:var(--red);font-family:var(--mono);">'+r+'R</span>'
              +'<span style="font-size:10px;color:var(--text3);font-family:var(--mono);">acerto: '+taxa+'%</span>'
            +'</div>';
          })()}
        </div>`).join('')}
    </div>`;
  });
  document.getElementById('s-notas').innerHTML=html;
}

function openNoteModal(id){
  editNoteId=id||null;
  const nota=id?notas.find(n=>n.id===id):null;
  document.getElementById('modal-nota-title').textContent=nota?'Editar nota':'Nova nota';
  document.getElementById('nota-title-input').value=nota?nota.title:'';
  document.getElementById('nota-body-input').value=nota?nota.body:'';
  document.getElementById('nota-tags-input').value=nota&&nota.tags?(nota.tags.join(', ')):'';
  document.getElementById('nota-cat-input').value=nota?nota.cat:'estrategia';
  document.getElementById('btn-del-nota').style.display=nota?'':'none';
  document.getElementById('modal-nota-msg').textContent='';
  // Show linked entries in modal
  const entDiv=document.getElementById('modal-nota-entries');
  if(entDiv){
    if(nota){
      const linked=entradas.filter(function(e){return e.notaId===nota.id;});
      if(linked.length){
        const g=linked.filter(function(e){return e.result==='green';}).length;
        const r=linked.length-g;
        const liq=linked.filter(function(e){return e.result==='green';}).reduce(function(a,e){return a+e.profit;},0)-linked.filter(function(e){return e.result==='red';}).reduce(function(a,e){return a+e.stake;},0);
        const taxaM=((g/linked.length)*100).toFixed(0);
        let entHtml='<div style="background:var(--purple-dim);border:1px solid rgba(167,139,250,0.3);border-radius:var(--radius);padding:10px 12px;">';
        entHtml+='<div style="font-size:11px;font-weight:600;color:var(--purple);margin-bottom:6px;">Entradas vinculadas ('+linked.length+')</div>';
        entHtml+='<div style="font-size:11px;font-family:var(--mono);color:var(--text3);">Acerto: '+taxaM+'% &nbsp;·&nbsp; <span style="color:var(--green)">'+g+'G</span> / <span style="color:var(--red)">'+r+'R</span> &nbsp;·&nbsp; resultado: <span style="color:'+(liq>=0?'var(--green)':'var(--red)')+'">'+(liq>=0?'+':'')+fmt(liq)+'</span></div>';
        entHtml+='</div>';
        entDiv.innerHTML=entHtml;
      } else {
        entDiv.innerHTML='<div style="font-size:11px;color:var(--text3);font-family:var(--mono);">// nenhuma entrada vinculada ainda</div>';
      }
    } else { entDiv.innerHTML=''; }
  }
  document.getElementById('modal-nota').classList.add('open');
  document.getElementById('nota-title-input').focus();
}

function closeNoteModal(){
  document.getElementById('modal-nota').classList.remove('open');
  editNoteId=null;
}

function saveNote(){
  const title=(document.getElementById('nota-title-input').value||'').trim();
  const body=(document.getElementById('nota-body-input').value||'').trim();
  const tagsRaw=(document.getElementById('nota-tags-input').value||'').trim();
  const cat=document.getElementById('nota-cat-input').value||'outro';
  const tags=tagsRaw?tagsRaw.split(',').map(t=>t.trim()).filter(Boolean):[];
  if(!title&&!body){document.getElementById('modal-nota-msg').textContent='// título ou conteúdo obrigatório';return;}
  if(editNoteId){
    const i=notas.findIndex(n=>n.id===editNoteId);
    if(i>=0) notas[i]={...notas[i],title,body,tags,cat,updatedDate:new Date().toLocaleDateString('pt-BR')};
  } else {
    notas.unshift({id:'nota_'+Date.now(),title,body,tags,cat,date:new Date().toLocaleDateString('pt-BR')});
  }
  persist();
  document.getElementById('modal-nota-msg').textContent='// salvo!';
  setTimeout(()=>{closeNoteModal();renderNotas();},500);
}

function deleteNote(){
  if(!editNoteId||!confirm('Apagar esta nota?')) return;
  notas=notas.filter(n=>n.id!==editNoteId);
  persist();closeNoteModal();renderNotas();
}

function saveGCfg(){
  globalCfg.epd=parseInt(document.getElementById('gcfg-e').value)||3;
  globalCfg.dpw=parseInt(document.getElementById('gcfg-d').value)||5;
  persist();renderAll();
  const el=document.getElementById('gcfg-msg');if(el){el.textContent='// salvo';setTimeout(()=>{if(el)el.textContent='';},2000);}
}

function saveMCfg(id){
  const stakesPorCasa={};
  const metasPorCasa={};
  const redsPorCasa={};
  casas.forEach(function(cx){
    const es=document.getElementById('mc-sc-'+id+'-'+cx.id);
    const em=document.getElementById('mc-mc-'+id+'-'+cx.id);
    const er=document.getElementById('mc-rc-'+id+'-'+cx.id);
    if(es) stakesPorCasa[cx.id]=parseFloat(es.value)||0;
    if(em) metasPorCasa[cx.id]=parseFloat(em.value)||0;
    if(er) redsPorCasa[cx.id]=parseInt(er.value)||2;
  });
  methodCfg[id]={
    stake0:parseFloat(document.getElementById('mc-s0-'+id).value)||150,
    metaStake:parseFloat(document.getElementById('mc-ms-'+id).value)||1000,
    reds:parseInt(document.getElementById('mc-r-'+id).value)||2,
    oddMin:parseFloat(document.getElementById('mc-omin-'+id).value)||1.5,
    oddMax:parseFloat(document.getElementById('mc-omax-'+id).value)||30,
    stakesPorCasa,metasPorCasa,redsPorCasa
  };
  persist();renderAll();
  const el=document.getElementById('mc-msg-'+id);if(el){el.textContent='// salvo';setTimeout(()=>{if(el)el.textContent='';},2000);}
}

function resetAll(){
  if(!confirm('Apagar todo o histórico de entradas? Configurações, casas e notas serão mantidas.')) return;
  entradas=[];pendentes=[];persist();renderAll();
}

function deleteEntrada(id){
  if(!confirm('Excluir esta entrada? A stake progressiva será recalculada.')) return;
  entradas=entradas.filter(function(e){return e.id!==id;});
  persist();renderAll();
}

// ─── EDIÇÃO INLINE DE ENTRADAS ─────────────────────────────────────────────
function openEditRow(id){
  // Fecha qualquer outro aberto
  document.querySelectorAll('[id^="hist-edit-"]').forEach(function(r){r.style.display='none';});
  const row=document.getElementById('hist-edit-'+id);
  if(!row) return;
  row.style.display='';
  // Setar os selects com valor correto após render
  const e=entradas.find(function(x){return x.id===id;});
  if(!e) return;
  const selMet=document.getElementById('ed-met-'+id);
  const selCasa=document.getElementById('ed-casa-'+id);
  if(selMet) selMet.value=e.methodId;
  if(selCasa) selCasa.value=e.casaId||'';
  // Calcular preview inicial
  calcEditPreview(id);
  // Scroll para a linha
  row.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeEditRow(id){
  const row=document.getElementById('hist-edit-'+id);
  if(row) row.style.display='none';
}

function calcEditPreview(id){
  const e=entradas.find(function(x){return x.id===id;});
  if(!e) return;
  const odd=parseFloat(document.getElementById('ed-odd-'+id).value)||e.odd;
  const stake=parseFloat(document.getElementById('ed-stake-'+id).value)||e.stake;
  const res=document.getElementById('ed-res-'+id).value;
  const mid=document.getElementById('ed-met-'+id).value;
  const m=mById(mid);
  const im=getInputMode(m);
  const profit=calcProfit(stake,odd,im);
  const prev=document.getElementById('ed-preview-'+id);
  if(!prev) return;
  const isLay=im==='responsabilidade';
  prev.innerHTML=(isLay
    ?'Resp: <strong style="color:var(--red)">'+fmt(stake)+'</strong> &nbsp;·&nbsp; Lucro estimado: <strong style="color:var(--green)">+'+fmt(profit)+'</strong>'
    :'Stake: <strong style="color:var(--blue)">'+fmt(stake)+'</strong> &nbsp;·&nbsp; Lucro estimado: <strong style="color:var(--green)">+'+fmt(profit)+'</strong>')
    +' &nbsp;·&nbsp; Resultado: <strong style="color:'+(res==='green'?'var(--green)':'var(--red)')+';">'+(res==='green'?'GREEN':'RED')+'</strong>';
}

function saveEditRow(id){
  const idx=entradas.findIndex(function(x){return x.id===id;});
  if(idx<0) return;
  const e=entradas[idx];
  const odd=parseFloat(document.getElementById('ed-odd-'+id).value);
  const stake=parseFloat(document.getElementById('ed-stake-'+id).value);
  const res=document.getElementById('ed-res-'+id).value;
  const mid=document.getElementById('ed-met-'+id).value;
  const casaId=document.getElementById('ed-casa-'+id).value||'';
  const obs=(document.getElementById('ed-obs-'+id).value||'').trim();
  const desfal=(document.getElementById('ed-des-'+id).value||'').trim();
  const under25=parseFloat(document.getElementById('ed-u25-'+id).value)||null;

  if(!odd||odd<=1){
    const msg=document.getElementById('ed-msg-'+id);
    if(msg){msg.style.color='var(--red)';msg.textContent='// odd inválida';}
    return;
  }
  if(!stake||stake<=0){
    const msg=document.getElementById('ed-msg-'+id);
    if(msg){msg.style.color='var(--red)';msg.textContent='// stake inválida';}
    return;
  }

  const m=mById(mid);
  const im=getInputMode(m);
  const mc=mcfg(mid);
  const metaCasa=getMetaStake(mid,casaId||undefined);
  const stakeBase0=getStakeBase(mid,casaId||undefined);
  const profit=parseFloat(calcProfit(stake,odd,im).toFixed(2));
  const stakeAfter=e.phase===1
    ?(res==='green'?parseFloat(Math.min(stake+profit,metaCasa).toFixed(2)):stakeBase0)
    :metaCasa;

  // Atualizar a entrada
  entradas[idx]={
    ...e,
    methodId:mid,
    methodName:m.name,
    type:m.type,
    inputMode:im,
    stake:parseFloat(stake.toFixed(2)),
    odd:parseFloat(odd.toFixed(2)),
    profit,
    result:res,
    stakeAfter,
    casaId,
    obs,
    desfal,
    under25,
    editedAt:new Date().toLocaleString('pt-BR')
  };

  // Recalcular stakeAfter de entradas posteriores da mesma casa+método
  recalcSubsequentStakes(id, mid, casaId);

  persist();

  const msg=document.getElementById('ed-msg-'+id);
  if(msg){msg.style.color='var(--green)';msg.textContent='// salvo!';}
  setTimeout(function(){renderAll();},600);
}

function recalcSubsequentStakes(editedId, mid, casaId){
  // Pega todas as entradas do mesmo método+casa na ordem original
  const sameGroup=entradas.filter(function(e){
    return e.methodId===mid&&(casaId?e.casaId===casaId:!e.casaId||e.casaId==='');
  });
  // Encontra a posição da entrada editada
  const editedPos=sameGroup.findIndex(function(e){return e.id===editedId;});
  if(editedPos<0||editedPos>=sameGroup.length-1) return;
  // Recalcula as subsequentes
  const mc=mcfg(mid);
  const m=mById(mid);
  const im=getInputMode(m);
  const metaCasa=getMetaStake(mid,casaId||undefined);
  const stakeBase0=getStakeBase(mid,casaId||undefined);
  let prevStakeAfter=sameGroup[editedPos].stakeAfter;
  for(let i=editedPos+1;i<sameGroup.length;i++){
    const e=sameGroup[i];
    const globalIdx=entradas.findIndex(function(x){return x.id===e.id;});
    if(globalIdx<0) continue;
    const newStake=prevStakeAfter;
    const newProfit=parseFloat(calcProfit(newStake,e.odd,im).toFixed(2));
    const newStakeAfter=e.phase===1
      ?(e.result==='green'?parseFloat(Math.min(newStake+newProfit,metaCasa).toFixed(2)):stakeBase0)
      :metaCasa;
    entradas[globalIdx]={...entradas[globalIdx],stake:parseFloat(newStake.toFixed(2)),profit:newProfit,stakeAfter:newStakeAfter};
    prevStakeAfter=newStakeAfter;
  }
}

// ─── EXPORTAR CSV ──────────────────────────────────────────────────────────
function exportCSV(){
  if(!entradas.length){alert('Nenhuma entrada para exportar.');return;}
  const h=['#','Data','Método','Casa','Tipo','Fase','Stake','Odd','Under2.5','Resultado','Lucro/Perda','Stake após','Obs','Desfalques'];
  const rows=entradas.map((e,i)=>{
    const casa=casaById(e.casaId);
    return [i+1,e.date,e.methodName,casa?casa.name:'',e.type,e.phase,e.stake.toFixed(2),e.odd,e.under25||'',e.result==='green'?'Green':'Red',e.result==='green'?e.profit.toFixed(2):'-'+e.stake.toFixed(2),e.stakeAfter.toFixed(2),e.obs||'',e.desfal||''];
  });
  const blob=new Blob([[h,...rows].map(r=>r.join(';')).join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tradebank_historico.csv';a.click();
}

function calcNextBackupThreshold(){
  if(!backupCfg.auto) return null;
  const f=backupCfg.freq;
  if(f==='diario') return 'na próxima 1ª entrada do dia';
  if(f==='semanal') return 'na 1ª entrada desta semana';
  const n=parseInt(f)||10;
  const done=backupCfg.lastBackupCount||0;
  const cur=entradas.length;
  const falta=n-(cur-done);
  if(falta<=0) return 'no próximo registro';
  return 'em '+falta+' entrada(s)';
}

function saveBkpCfg(){
  const sel=document.getElementById('bkp-auto');
  const freq=document.getElementById('bkp-freq');
  if(sel) backupCfg.auto=(sel.value==='true');
  if(freq) backupCfg.freq=freq.value;
  persist();
  renderConfig();
  const el=document.getElementById('db-msg');
  if(el){el.style.color='var(--green)';el.textContent='// configuração de backup salva';setTimeout(function(){if(el)el.textContent='';},2000);}
}

function recordBackupHistory(tipo,filename){
  const rec={
    date:new Date().toLocaleString('pt-BR'),
    tipo,
    entradas:entradas.length,
    arquivo:filename,
    ts:Date.now()
  };
  if(!backupCfg.history) backupCfg.history=[];
  backupCfg.history.push(rec);
  // Keep only last 20
  if(backupCfg.history.length>20) backupCfg.history=backupCfg.history.slice(-20);
  backupCfg.lastBackup=rec.date;
  backupCfg.lastBackupCount=entradas.length;
  persist();
}

function autoBackupPayload(){
  return JSON.stringify({
    version:4,
    exportedAt:new Date().toLocaleString('pt-BR'),
    auto:true,
    globalCfg,methodCfg,casas,entradas,pendentes,notas,marcos
  },null,2);
}

function triggerAutoBackup(reason){
  if(!backupCfg.auto) return;
  const d=new Date();
  const stamp=d.getFullYear()+''+(d.getMonth()+1).toString().padStart(2,'0')+d.getDate().toString().padStart(2,'0')+'_'+d.getHours().toString().padStart(2,'0')+d.getMinutes().toString().padStart(2,'0');
  const filename='tradebank_auto_'+stamp+'.json';
  const blob=new Blob([autoBackupPayload()],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  recordBackupHistory('auto',filename);
  // Show toast notification
  showBackupToast('💾 Backup automático salvo: '+filename);
}

function shouldAutoBackup(){
  if(!backupCfg.auto) return false;
  const f=backupCfg.freq;
  const now=new Date();
  if(f==='diario'){
    if(!backupCfg.lastBackup) return true;
    const last=new Date(backupCfg.lastBackupCount?0:0); // just check date
    const lastDate=backupCfg.lastBackup.split(',')[0];
    const today=now.toLocaleDateString('pt-BR');
    return lastDate!==today;
  }
  if(f==='semanal'){
    if(!backupCfg.lastBackup) return true;
    const lastDate=backupCfg.lastBackup.split(',')[0];
    const lastD=parseDateBR(lastDate);
    if(!lastD) return true;
    return startOfWeek(now).getTime() > startOfWeek(lastD).getTime();
  }
  // Entry-based
  const n=parseInt(f)||10;
  const done=backupCfg.lastBackupCount||0;
  return (entradas.length-done)>=n;
}

function checkAutoBackup(){
  if(shouldAutoBackup()) triggerAutoBackup('auto');
}

function showBackupToast(msg){

    document.body.appendChild(toast);
  }
  toast.textContent=msg;
  toast.style.opacity='1';
  clearTimeout(toast._timer);
  toast._timer=setTimeout(function(){toast.style.opacity='0';},4000);
}

function migrateFromOld(){
  // Tenta ler dados das versões anteriores do TradeBank (chaves sem sufixo numérico)
  const sources = [
    {label:'TradeBank v2/v3', keys:{gcfg:'gcfg', mcfg:'mcfg', ent:'ent', amid:'amid'}},
    {label:'TradeBank widget tradeV4', keys:{gcfg:null, mcfg:null, ent:null, amid:null, raw:'tradeV4'}},
    {label:'TradeBank widget tradeLayV1', keys:{raw:'tradeLayV1'}},
    {label:'TradeBank widget tradeAppV3', keys:{raw:'tradeAppV3'}},
  ];

  let found = null;
  let foundLabel = '';

  // Tenta fonte principal: chaves gcfg/mcfg/ent (TradeBank v2/v3 HTML)
  const oldEnt = localStorage.getItem('ent');
  const oldMcfg = localStorage.getItem('mcfg');
  const oldGcfg = localStorage.getItem('gcfg');
  if(oldEnt){
    try{
      const ents = JSON.parse(oldEnt);
      if(Array.isArray(ents) && ents.length > 0){
        found = {entradas: ents, mcfg: oldMcfg ? JSON.parse(oldMcfg) : null, gcfg: oldGcfg ? JSON.parse(oldGcfg) : null};
        foundLabel = 'TradeBank v2/v3 ('+ents.length+' entradas)';
      }
    }catch(e){}
  }

  // Fallback: chave única 'tradeV4' (widget inline)
  if(!found){
    const raw = localStorage.getItem('tradeV4');
    if(raw){
      try{
        const d = JSON.parse(raw);
        if(d.history && Array.isArray(d.history)){
          // Converte formato do widget para formato do app
          const ents = d.history.map(function(h,i){
            return {
              id: h.n || i+1,
              date: h.date || new Date().toLocaleDateString('pt-BR'),
              methodId: h.mi===1?'lay10':'lay01',
              methodName: h.mi===1?'Lay 1x0':'Lay 0x1',
              type:'lay', inputMode:'responsabilidade', phase: h.phase||1,
              stake: parseFloat(h.stakeB)||150,
              odd: parseFloat(h.odd)||20,
              profit: h.lucro>=0?parseFloat(h.lucro):0,
              result: h.result||'green',
              stakeAfter: parseFloat(h.stakeAfter)||150,
              obs: h.game||'', casaId:'', under25:null, desfal:''
            };
          });
          found = {entradas: ents, mcfg: null, gcfg: null};
          foundLabel = 'Widget TradeBank ('+ents.length+' entradas)';
        }
      }catch(e){}
    }
  }

  // Fallback: chave 'tradeLayV1'
  if(!found){
    const raw2 = localStorage.getItem('tradeLayV1');
    if(raw2){
      try{
        const d = JSON.parse(raw2);
        if(d.history && Array.isArray(d.history)){
          const ents = d.history.map(function(h,i){
            const mid = (h.mi===1||h.methodId==='lay10')?'lay10':'lay01';
            return {
              id: h.n||i+1, date: h.date||new Date().toLocaleDateString('pt-BR'),
              methodId: mid, methodName: mid==='lay10'?'Lay 1x0':'Lay 0x1',
              type:'lay', inputMode:'responsabilidade', phase: h.phase||1,
              stake: parseFloat(h.stakeB||h.stake)||150,
              odd: parseFloat(h.odd)||20,
              profit: (h.lucro>=0?parseFloat(h.lucro):0),
              result: h.result||'green',
              stakeAfter: parseFloat(h.stakeAfter)||150,
              obs: h.game||h.obs||'', casaId:'', under25:null, desfal:''
            };
          });
          found = {entradas: ents, mcfg: null, gcfg: null};
          foundLabel = 'Widget Lay 0x1/1x0 ('+ents.length+' entradas)';
        }
      }catch(e){}
    }
  }

  if(!found || !found.entradas || !found.entradas.length){
    alert('Nenhum dado de versão anterior encontrado neste navegador.\n\nCertifique-se de que o arquivo HTML antigo foi aberto neste mesmo navegador e que os dados não foram apagados.');
    return;
  }

  if(!confirm('Dados encontrados: '+foundLabel+'\n\nImportar para o TradeBank v4?\n\nOs dados atuais do v4 serão MANTIDOS — as entradas antigas serão ADICIONADAS ao histórico existente.')){
    return;
  }

  // Mescla entradas (evita duplicatas por id)
  const idsExist = new Set(entradas.map(function(e){return String(e.id);}));
  let added = 0;
  found.entradas.forEach(function(e){
    if(!idsExist.has(String(e.id))){
      entradas.push(e);
      added++;
    }
  });

  // Importa gcfg se não houver dados no v4 ainda
  if(found.gcfg && entradas.length === added){
    globalCfg = {...globalCfg, ...found.gcfg};
  }
  // Importa methodCfg
  if(found.mcfg){
    Object.keys(found.mcfg).forEach(function(k){
      if(!methodCfg[k]) methodCfg[k] = found.mcfg[k];
      else methodCfg[k] = {...found.mcfg[k], ...methodCfg[k]};
    });
  }

  persist(); renderAll(); updatePendBadge();
  const el = document.getElementById('db-msg');
  if(el){
    el.style.color='var(--green)';
    el.textContent = '// migração concluída — '+added+' entradas importadas de "'+foundLabel+'"';
    setTimeout(function(){if(el)el.textContent='';}, 6000);
  }
}

function importDB(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json,.txt';
  input.onchange=function(ev){
    const file=ev.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const payload=JSON.parse(e.target.result);
        if(!payload.entradas&&!payload.casas){
          alert('Arquivo inválido — não parece ser um backup do TradeBank.');return;
        }
        if(!confirm('Importar este backup?\n\nIsso vai SUBSTITUIR todos os dados atuais (entradas, configurações, casas, notas).\n\nExporte um backup antes se quiser preservar os dados atuais.')) return;
        if(payload.globalCfg) globalCfg={...globalCfg,...payload.globalCfg};
        if(payload.methodCfg) methodCfg={...methodCfg,...payload.methodCfg};
        if(payload.casas&&payload.casas.length) casas=payload.casas;
        if(payload.entradas) entradas=payload.entradas;
        if(payload.pendentes) pendentes=payload.pendentes;
        if(payload.notas) notas=payload.notas;
        // Migração casas padrão
        CASAS_DEFAULT.forEach(function(cd){
          if(!casas.find(function(x){return x.id===cd.id;})) casas.push({...cd});
        });
        persist();renderAll();updatePendBadge();
        const el=document.getElementById('db-msg');
        if(el){
          el.textContent='// importado com sucesso — '+entradas.length+' entradas, '+pendentes.length+' pendentes, '+notas.length+' notas';
          el.style.color='var(--green)';
          setTimeout(()=>{if(el)el.textContent='';},5000);
        }
      }catch(err){
        alert('Erro ao ler o arquivo: '+err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

let rptPeriodo='mes'; // semana | mes | trimestre | tudo

function renderRelatorio(){
  const now=new Date();
  const periods={
    semana:{label:'Esta semana', from:startOfWeek(now)},
    mes:{label:'Este mês', from:startOfMonth(now)},
    trimestre:{label:'Últimos 3 meses', from:new Date(now.getFullYear(),now.getMonth()-2,1)},
    tudo:{label:'Todo o período', from:new Date(2000,0,1)},
  };
  const per=periods[rptPeriodo];
  const entsPeríodo=entradas.filter(function(e){
    const d=parseDateBR(e.date);
    return d&&d>=per.from;
  });

  // Totais gerais
  const gTotal=entsPeríodo.filter(function(e){return e.result==='green';});
  const rTotal=entsPeríodo.filter(function(e){return e.result==='red';});
  const lucroTotal=gTotal.reduce(function(a,e){return a+e.profit;},0);
  const perdaTotal=rTotal.reduce(function(a,e){return a+e.stake;},0);
  const liqTotal=lucroTotal-perdaTotal;
  const taxaTotal=entsPeríodo.length>0?((gTotal.length/entsPeríodo.length)*100).toFixed(1):0;
  const oddsArr=entsPeríodo.map(function(e){return e.odd;});
  const oddMediaReal=oddsArr.length>0?(oddsArr.reduce(function(a,b){return a+b;},0)/oddsArr.length).toFixed(2):null;
  const lucroMedioEnt=entsPeríodo.length>0?(liqTotal/entsPeríodo.length).toFixed(2):0;

  // Por método
  const porMetodo=METHODS_DEF.map(function(m){
    const ents=entsPeríodo.filter(function(e){return e.methodId===m.id;});
    if(!ents.length) return null;
    const g=ents.filter(function(e){return e.result==='green';});
    const r=ents.filter(function(e){return e.result==='red';});
    const lucro=g.reduce(function(a,e){return a+e.profit;},0);
    const perda=r.reduce(function(a,e){return a+e.stake;},0);
    return {m,total:ents.length,g:g.length,r:r.length,liq:parseFloat((lucro-perda).toFixed(2)),taxa:((g.length/ents.length)*100).toFixed(1)};
  }).filter(Boolean);

  // Por casa
  const porCasa=casas.map(function(cx){
    const ents=entsPeríodo.filter(function(e){return e.casaId===cx.id;});
    if(!ents.length) return null;
    const g=ents.filter(function(e){return e.result==='green';});
    const r=ents.filter(function(e){return e.result==='red';});
    const lucro=g.reduce(function(a,e){return a+e.profit;},0);
    const perda=r.reduce(function(a,e){return a+e.stake;},0);
    return {cx,total:ents.length,g:g.length,r:r.length,liq:parseFloat((lucro-perda).toFixed(2)),taxa:((g.length/ents.length)*100).toFixed(1)};
  }).filter(Boolean);

  // Por dia da semana
  const DIAS_NOMES=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const porDia=DIAS_NOMES.map(function(d,di){
    const ents=entsPeríodo.filter(function(e){const dt=parseDateBR(e.date);return dt&&dt.getDay()===di;});
    if(!ents.length) return null;
    const g=ents.filter(function(e){return e.result==='green';});
    const lucro=g.reduce(function(a,e){return a+e.profit;},0);
    const perda=ents.filter(function(e){return e.result==='red';}).reduce(function(a,e){return a+e.stake;},0);
    return {dia:d,total:ents.length,g:g.length,r:ents.length-g.length,liq:parseFloat((lucro-perda).toFixed(2)),taxa:((g.length/ents.length)*100).toFixed(1)};
  }).filter(Boolean);

  // Melhor e pior dia
  const melhorDia=porDia.length?porDia.reduce(function(a,b){return parseFloat(b.taxa)>parseFloat(a.taxa)?b:a;}):null;
  const piorDia=porDia.length?porDia.reduce(function(a,b){return parseFloat(b.taxa)<parseFloat(a.taxa)?b:a;}):null;

  // Sequência atual de greens/reds
  let seqAtual=0, seqTipo='';
  for(let i=entradas.length-1;i>=0;i--){
    if(i===entradas.length-1){seqTipo=entradas[i].result;seqAtual=1;}
    else if(entradas[i].result===seqTipo){seqAtual++;}
    else break;
  }

  function rptMetric(label,val,cls,sub){
    return '<div class="rpt-card"><div class="rpt-label">'+label+'</div><div class="rpt-val '+(cls||'')+'">'+val+'</div>'+(sub?'<div style="font-size:11px;color:var(--text3);margin-top:4px;">'+sub+'</div>':'')+'</div>';
  }

  // Período selector
  let html='<div class="rpt-print-header"><div style="font-size:20px;font-weight:700;margin-bottom:4px;">TradeBank — Relatório</div><div style="font-size:12px;color:#555;">'+per.label+' · Gerado em '+now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR')+'</div></div>';

  html+='<div class="rpt-period-sel rpt-no-print">'
    +Object.keys(periods).map(function(k){return '<button class="rpt-period-btn'+(rptPeriodo===k?' active':'')+'" onclick="setRptPeriodo(\''+k+'\')" >'+periods[k].label+'</button>';}).join('')
    +'</div>';

  if(!entsPeríodo.length){
    html+='<div class="empty">// nenhuma entrada no período selecionado</div>';
    document.getElementById('s-relatorio').innerHTML=html;
    return;
  }

  // Header do período
  html+='<div style="background:var(--green-dim);border:1px solid var(--green-border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">'
    +'<div><div style="font-size:10px;font-family:var(--mono);color:var(--green);text-transform:uppercase;letter-spacing:.08em;">'+per.label+'</div>'
    +'<div style="font-size:13px;color:var(--text2);margin-top:2px;">'+per.from.toLocaleDateString('pt-BR')+' → '+now.toLocaleDateString('pt-BR')+'</div></div>'
    +'<button onclick="printReport()" class="rpt-no-print" style="padding:8px 20px;border-radius:var(--radius);border:1px solid var(--green-border);background:var(--green);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:6px;">'
    +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>'
    +'Imprimir / PDF</button>'
  +'</div>';

  // Cards de resumo
  html+='<div class="rpt-grid">'
    +rptMetric('Resultado líquido',fmt(liqTotal),liqTotal>=0?'g':'r','')
    +rptMetric('Total de entradas',entsPeríodo.length,'','')
    +rptMetric('Taxa de acerto',taxaTotal+'%',parseFloat(taxaTotal)>=80?'g':parseFloat(taxaTotal)>=60?'':'r','')
    +rptMetric('Greens / Reds',gTotal.length+' / '+rTotal.length,'','')
    +rptMetric('Lucro bruto',fmt(lucroTotal),'g','')
    +rptMetric('Perda total',fmt(perdaTotal),'r','')
    +rptMetric('Odd média real',oddMediaReal||'—','b','')
    +rptMetric('Lucro médio/entrada',fmt(lucroMedioEnt),parseFloat(lucroMedioEnt)>=0?'g':'r','')

  if(seqAtual>1){
    const seqCor=seqTipo==='green'?'var(--green)':'var(--red)';
    html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:14px;font-size:12px;display:flex;align-items:center;gap:10px;">'

      +'<span>Sequência atual: <strong style="color:'+seqCor+'">'+seqAtual+'× '+(seqTipo==='green'?'GREEN':'RED')+'</strong> consecutivos</span>'
    +'</div>';

  if(porMetodo.length){
    html+='<div class="rpt-section">Performance por método</div>'
      +'<table class="rpt-table"><thead><tr><th>Método</th><th>Entradas</th><th>G</th><th>R</th><th>Taxa</th><th>Resultado</th><th>Performance</th></tr></thead><tbody>'
      +porMetodo.map(function(x){
        const t=parseFloat(x.taxa);

        return '<tr>'

          +'<td><div class="rpt-bar-wrap"><div class="rpt-bar-fill" style="width:'+t+'%;background:'+cor+'"></div></div></td>'
        +'</tr>';

  // Por casa

  if(porDia.length){

    var equipesStats={};

      var obs=e.obs||'';
      // Tenta separar o jogo por x, X, vs, -
      var sep=obs.match(/\s+(x|X|vs|VS|-)\s+/);
      if(!sep) return;
      var partes=obs.split(sep[0]);
      if(partes.length<2) return;
      var casa=(partes[0]||'').trim();
      var fora=(partes[1]||'').split(/[|\[]/)[0].trim(); // remove observações extras
      if(!casa||!fora) return;
      [casa,fora].forEach(function(time,idx){
        if(!time||time.length<2) return;

        else{equipesStats[time].r++;equipesStats[time].lucro-=e.stake;}
        equipesStats[time].entradas.push(e);
        if(idx===0) equipesStats[time].mandante++;
        else equipesStats[time].visitante++;
      });
    });
    var times=Object.values(equipesStats).filter(function(t){return t.g+t.r>=1;});

    // Ordena por taxa de acerto desc, depois por lucro
    times.sort(function(a,b){

      var tB=b.g+b.r>0?(b.g/(b.g+b.r)):0;

      +'<table class="rpt-table"><thead><tr>'
        +'<th>#</th><th>Equipe</th><th>Método</th><th>G</th><th>R</th><th>Taxa</th><th>Resultado</th><th>Mand.</th><th>Visit.</th>'
      +'</tr></thead><tbody>';
    times.slice(0,20).forEach(function(t,i){
      var taxa=t.g+t.r>0?((t.g/(t.g+t.r))*100).toFixed(0)+'%':'—';
      var taxaNum=t.g+t.r>0?(t.g/(t.g+t.r))*100:0;
      var corTaxa=taxaNum>=80?'var(--green)':taxaNum>=60?'var(--amber)':'var(--red)';
      // Método mais usado com este time
      var metContagem={};
      t.entradas.forEach(function(e){metContagem[e.methodName]=(metContagem[e.methodName]||0)+1;});
      var metPrincipal=Object.keys(metContagem).sort(function(a,b){return metContagem[b]-metContagem[a];})[0]||'—';
      var medalha=i===0?'🥇':i===1?'🥈':i===2?'🥉':''+(i+1)+'.';
      var trStyle=i===0?'background:rgba(34,211,160,0.04)':i===1?'background:rgba(79,142,247,0.04)':i===2?'background:rgba(245,166,35,0.04)':'';
      html+='<tr'+(trStyle?(' style="'+trStyle+'"'):'')+'>'  
        +'<td style="font-weight:700;color:var(--text2);">'+medalha+'</td>'
        +'<td style="font-weight:600;">'+t.nome+'</td>'
        +'<td style="font-size:11px;color:var(--text3);">'+metPrincipal+'</td>'
        +'<td style="color:var(--green);font-family:var(--mono);">'+t.g+'</td>'
        +'<td style="color:var(--red);font-family:var(--mono);">'+t.r+'</td>'
        +'<td style="color:'+corTaxa+';font-weight:700;font-family:var(--mono);">'+taxa+'</td>'
        +'<td style="color:'+(t.lucro>=0?'var(--green)':'var(--red)')+';font-family:var(--mono);font-weight:600;">'+(t.lucro>=0?'+':'')+fmt(t.lucro)+'</td>'
        +'<td style="font-family:var(--mono);color:var(--text3);">'+t.mandante+'</td>'
        +'<td style="font-family:var(--mono);color:var(--text3);">'+t.visitante+'</td>'
      +'</tr>';
    });
    html+='</tbody></table>';
    if(times.length>20) html+='<div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:6px;">// mostrando top 20 de '+times.length+' equipes</div>';
  })();

  // Footer
  html+='<div style="text-align:center;font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:24px;padding-top:16px;border-top:1px solid var(--border);">TradeBank v4.0 · Relatório gerado em '+now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR')+'</div>';

  document.getElementById('s-relatorio').innerHTML=html;
}

// Calcula velocidade real: lucro por dia útil com base nos últimos N dias
function calcVelocidade(mid, casaId, dias){
  const now = new Date();
  const from = new Date(now.getFullYear(), now.getMonth(), now.getDate() - dias);
  const ents = entradas.filter(function(e){
    if(e.methodId !== mid) return false;
    if(casaId && e.casaId !== casaId) return false;
    const d = parseDateBR(e.date);
    return d && d >= from;
  });
  if(!ents.length) return null;
  const g = ents.filter(function(e){return e.result==='green';});
  const lucro = g.reduce(function(a,e){return a+e.profit;},0);
  const perda = ents.filter(function(e){return e.result==='red';}).reduce(function(a,e){return a+e.stake;},0);
  const diasUteis = Math.max(1, dias * (globalCfg.dpw/7));
  return parseFloat(((lucro-perda)/diasUteis).toFixed(2));
}

// Estimativa de data dado valor faltante e velocidade diária
function estimaData(falta, velDiaria){
  if(!velDiaria || velDiaria <= 0) return null;
  const diasNec = Math.ceil(falta / velDiaria);
  const d = new Date();
  d.setDate(d.getDate() + diasNec);
  return {data:d, dias:diasNec};
}

function marcoStatus(marco){
  const now = new Date();
  const valorAtual = marcoValorAtual(marco);
  if(valorAtual >= marco.valor) return 'atingido';
  if(marco.prazo){
    const prazo = new Date(marco.prazo + 'T23:59:59');
    if(prazo < now) return 'atrasado';
    // Verifica se está no ritmo
    const falta = marco.valor - valorAtual;
    const vel = calcVelocidade(marco.methodId, marco.casaId||null, 14);
    if(vel && vel > 0){
      const diasNec = Math.ceil(falta/vel);
      const diasAte = Math.ceil((prazo-now)/(1000*60*60*24));
      return diasNec <= diasAte ? 'no-prazo' : 'atrasado';
    }
  }
  return 'pendente';
}

function marcoValorAtual(marco){
  if(marco.tipo === 'stake'){
    return getStake(marco.methodId, marco.casaId||undefined);
  }
  if(marco.tipo === 'lucro'){
    const ents = entradas.filter(function(e){
      if(e.methodId !== marco.methodId) return false;
      if(marco.casaId && e.casaId !== marco.casaId) return false;
      return true;
    });
    const g = ents.filter(function(e){return e.result==='green';});
    const r = ents.filter(function(e){return e.result==='red';});
    return parseFloat((g.reduce(function(a,e){return a+e.profit;},0) - r.reduce(function(a,e){return a+e.stake;},0)).toFixed(2));
  }
  if(marco.tipo === 'entradas'){
    return entradas.filter(function(e){
      if(e.methodId !== marco.methodId) return false;
      if(marco.casaId && e.casaId !== marco.casaId) return false;
      return true;
    }).length;
  }
  return 0;
}

                const cor2  = diff >= 0 ? 'var(--green)' : 'var(--red)';
                return '<div class="mc"><div class="ml">Vs prazo</div><div class="mv mv-sm" style="color:'+cor2+';font-family:var(--mono);">'+(diff>=0?'+':'')+diff+' dias</div><div style="font-size:10px;color:var(--text3);margin-top:2px;">'+(diff>=0?'dentro do prazo':'pode atrasar')+'</div></div>';
              })()
            : '')
          +(vel30 && vel14 && Math.abs(vel30) > 0
            ? '<div class="mc"><div class="ml">Tendência (30d)</div><div class="mv mv-sm '+(vel30>0?'g':'r')+'" style="font-family:var(--mono);">'+(vel30>0?'+':'')+fmt(vel30)+'/dia</div></div>'
            : '')
        +'</div>'
    )
  +'</div>';

  return html;
}

function addMarco(){
  const nome = (document.getElementById('mk-nome').value||'').trim();
  const tipo = document.getElementById('mk-tipo').value;
  const valor = parseFloat(document.getElementById('mk-valor').value);
  const methodId = document.getElementById('mk-method').value;
  const casaId = document.getElementById('mk-casa').value||'';
  const prazo = document.getElementById('mk-prazo').value||'';
  const cor = document.getElementById('mk-cor').value||'#22d3a0';
  const desc = (document.getElementById('mk-desc').value||'').trim();

  if(!nome){
    const msg=document.getElementById('mk-msg');
    if(msg){msg.style.color='var(--red)';msg.textContent='// informe o nome do marco';}
    return;
  }
  if(!valor||valor<=0){
    const msg=document.getElementById('mk-msg');
    if(msg){msg.style.color='var(--red)';msg.textContent='// informe o valor alvo';}
    return;
  }

  marcos.push({
    id:'mk_'+Date.now(),
    nome, tipo, valor, methodId, casaId, prazo, cor, desc,
    criadoEm:new Date().toLocaleDateString('pt-BR'),
    celebrado:false, atingidoEm:null
  });
  persist();
  const msg=document.getElementById('mk-msg');
  if(msg){msg.style.color='var(--green)';msg.textContent='// marco criado!';}
  setTimeout(function(){renderMarcos();},400);
}

function deleteMarco(id){
  if(!confirm('Remover este marco?')) return;
  marcos = marcos.filter(function(m){return m.id!==id;});
  persist();renderMarcos();
}

function checkMarcosCelebration(){
  // Detecta marcos recém-atingidos e marca data de conclusão
  marcos.forEach(function(mk,i){
    if(!mk.atingidoEm && marcoStatus(mk)==='atingido'){
      marcos[i].atingidoEm = new Date().toLocaleDateString('pt-BR');
    }
  });
  updateMarcoBadge();
}

let cmpSelected = [];   // array de casaIds selecionados (máx 4)
let cmpMethod   = 'all'; // método para filtrar
let cmpCharts   = {};   // chart instances keyed by canvasId

function cmpToggleCasa(casaId){
  const idx = cmpSelected.indexOf(casaId);
  if(idx >= 0){ cmpSelected.splice(idx,1); }
  else { if(cmpSelected.length >= 4) cmpSelected.shift(); cmpSelected.push(casaId); }
  renderComparacao();
}

function cmpSetMethod(mid){ cmpMethod=mid; renderComparacao(); }

function cmpStats(casaId){
  const ents = entradas.filter(function(e){
    if(casaId && e.casaId !== casaId) return false;
    if(cmpMethod !== 'all' && e.methodId !== cmpMethod) return false;
    return true;
  });
  const g = ents.filter(function(e){return e.result==='green';});
  const r = ents.filter(function(e){return e.result==='red';});
  const lucro = g.reduce(function(a,e){return a+e.profit;},0);
  const perda = r.reduce(function(a,e){return a+e.stake;},0);
  const liq = parseFloat((lucro-perda).toFixed(2));
  const taxa = ents.length ? parseFloat(((g.length/ents.length)*100).toFixed(1)) : null;
  const odds = ents.map(function(e){return e.odd;});
  const oddReal = odds.length ? parseFloat((odds.reduce(function(a,b){return a+b;},0)/odds.length).toFixed(2)) : null;
  const mid = cmpMethod!=='all' ? cmpMethod : (ents.length ? ents[ents.length-1].methodId : null);
  const stake = mid ? getStake(mid, casaId) : 0;
  const stakeBase = mid ? getStakeBase(mid, casaId) : 0;
  // Lucro por entrada
  const lpe = ents.length ? parseFloat((liq/ents.length).toFixed(2)) : null;
  // Reds consecutivos
  let reds_consec = 0;
  for(let i=ents.length-1;i>=0;i--){ if(ents[i].result==='red') reds_consec++; else break; }
  // Melhor sequência de greens
  let bestSeq=0, curSeq=0;
  ents.forEach(function(e){ if(e.result==='green'){curSeq++;bestSeq=Math.max(bestSeq,curSeq);}else curSeq=0; });
  // Lucro acumulado ao longo do tempo
  let acum=0;
  const acumData = ents.map(function(e){ acum += e.result==='green'?e.profit:-e.stake; return parseFloat(acum.toFixed(2)); });
  return {ents,g:g.length,r:r.length,liq,taxa,oddReal,stake,stakeBase,lpe,reds_consec,bestSeq,acumData,lucro:parseFloat(lucro.toFixed(2)),perda:parseFloat(perda.toFixed(2))};
}

function calDayKey(d){ // d = Date → 'YYYY-MM-DD'
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function calEntriesForDay(key){
  return entradas.filter(function(e){
    const d = parseDateBR(e.date);
    if(!d) return false;
    if(calDayKey(d) !== key) return false;
    if(calFilterMethod !== 'all' && e.methodId !== calFilterMethod) return false;
    if(calFilterCasa === 'none' && (e.casaId||'') !== '') return false;
    if(calFilterCasa !== 'all' && calFilterCasa !== 'none' && e.casaId !== calFilterCasa) return false;
    return true;
  });
}

    +'<div class="mc"><div class="ml">Greens / Reds</div><div class="mv mv-sm"><span style="color:var(--green)">'+mG.length+'</span> / <span style="color:var(--red)">'+mR.length+'</span></div></div>'
    +'<div class="mc"><div class="ml">Taxa de acerto</div><div class="mv mv-sm '+(parseFloat(mTaxa)>=80?'g':parseFloat(mTaxa)>=60?'a':'r')+'">'+mTaxa+'%</div></div>'
    +'<div class="mc '+(mLiq>=0?'accent-g':'accent-r')+'"><div class="ml">Resultado do mês</div><div class="mv mv-sm '+(mLiq>=0?'g':'r')+'">'+(mLiq>=0?'+':'')+fmt(mLiq)+'</div></div>'
    +'</div>';

  // ── Calendar grid ────────────────────────────────────────────────────────
  let gridHtml = '<div class="cal-header">'
    + DOWS.slice(1).concat(DOWS[0]).map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('')
    + '</div><div class="cal-grid">';

  for(let i=0; i<totalCells; i++){
    const d = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate()+i);
    const key = calDayKey(d);
    const isCurrentMonth = d.getMonth() === calMonth;
    const isToday = key === today;
    const isFuture = d > now;
    const dayEnts = calEntriesForDay(key);
    const g = dayEnts.filter(function(e){return e.result==='green';});
    const r = dayEnts.filter(function(e){return e.result==='red';});
    const liq = g.reduce(function(a,e){return a+e.profit;},0) - r.reduce(function(a,e){return a+e.stake;},0);
    const isSelected = key === calSelDay;

    let cls = 'cal-day';
    if(!isCurrentMonth) cls += ' other-month';
    if(isToday) cls += ' today';
    if(dayEnts.length > 0){
      if(r.length === 0) cls += ' has-green';
      else if(g.length === 0) cls += ' has-red';
      else cls += ' has-mixed';
    }
    if(isSelected) cls += '" style="outline:2px solid var(--blue);outline-offset:1px;';

    // Dot row: one dot per entry (max 6)
    const dots = dayEnts.slice(0,6).map(function(e){
      return '<div class="cal-dot" style="background:'+(e.result==='green'?'#22d3a0':'#f25757')+';" title="'+(e.methodName||'')+' | Odd '+e.odd+'"></div>';
    }).join('') + (dayEnts.length>6?'<div style="font-size:8px;color:var(--text3);font-family:var(--mono);">+'+( dayEnts.length-6)+'</div>':'');

    gridHtml += '<div class="'+cls+'" onclick="calSelectDay(\''+key+'\','+d.getDate()+','+d.getMonth()+','+d.getFullYear()+')">'  
      +'<div class="cal-day-num">'+d.getDate()+'</div>'
      +(dayEnts.length ? '<div class="cal-dots">'+dots+'</div>' : '')
      +(dayEnts.length ? '<div class="cal-liq" style="color:'+(liq>=0?'var(--green)':'var(--red)')+';">'+(liq>=0?'+':'')+fmt(liq)+'</div>' : '')
      +(dayEnts.length ? '<div class="cal-count">'+dayEnts.length+' entrada'+(dayEnts.length>1?'s':'')+'</div>' : '')
      +'</div>';
  }
  gridHtml += '</div>';

  // ── Day detail panel ─────────────────────────────────────────────────────
  let detailHtml = '';
  if(calSelDay){
    const selEnts = calEntriesForDay(calSelDay);
    const selParts = calSelDay.split('-');
    const selLabel = parseInt(selParts[2])+'/'+parseInt(selParts[1])+'/'+selParts[0];
    if(selEnts.length){
      const sg = selEnts.filter(function(e){return e.result==='green';});
      const sr = selEnts.filter(function(e){return e.result==='red';});
      const sliq = sg.reduce(function(a,e){return a+e.profit;},0) - sr.reduce(function(a,e){return a+e.stake;},0);
      detailHtml = '<div class="cal-detail">'
        +'<div class="cal-detail-title">'+selLabel+' — '+selEnts.length+' entrada'+(selEnts.length>1?'s':'')+' &nbsp;<span style="color:'+(sliq>=0?'var(--green)':'var(--red)')+';">'+(sliq>=0?'+':'')+fmt(sliq)+'</span></div>'
        +'<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;">'
          +'<thead><tr>'
            +'<th style="text-align:left;padding:5px 8px;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono);text-transform:uppercase;">Hora</th>'
            +'<th style="text-align:left;padding:5px 8px;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono);text-transform:uppercase;">Método</th>'
            +'<th style="text-align:left;padding:5px 8px;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono);text-transform:uppercase;">Casa</th>'
            +'<th style="text-align:left;padding:5px 8px;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono);text-transform:uppercase;">Stake</th>'
            +'<th style="text-align:left;padding:5px 8px;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono);text-transform:uppercase;">Odd</th>'
            +'<th style="text-align:left;padding:5px 8px;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono);text-transform:uppercase;">Resultado</th>'
            +'<th style="text-align:left;padding:5px 8px;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono);text-transform:uppercase;">Lucro/Perda</th>'
            +'<th style="text-align:left;padding:5px 8px;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono);text-transform:uppercase;">Jogo</th>'
          +'</tr></thead><tbody>'
        +selEnts.map(function(e){
          const mm=mById(e.methodId);
          const cx=casaById(e.casaId);
          const hora=e.date.includes(',')?e.date.split(',')[1].trim().slice(0,5):'';
          return '<tr>'
            +'<td style="padding:5px 8px;font-family:var(--mono);color:var(--text3);font-size:11px;">'+hora+'</td>'
            +'<td style="padding:5px 8px;"><span style="font-size:11px;font-weight:600;color:'+mm.color+'">'+e.methodName+'</span></td>'
            +'<td style="padding:5px 8px;">'+(cx?'<span style="color:'+cx.color+';font-size:11px;">'+cx.name+'</span>':'<span style="color:var(--text3);font-size:11px;">—</span>')+'</td>'
            +'<td style="padding:5px 8px;font-family:var(--mono);font-size:11px;">'+fmt(e.stake)+'</td>'
            +'<td style="padding:5px 8px;font-family:var(--mono);">'+e.odd+'</td>'
            +'<td style="padding:5px 8px;"><span class="badge '+(e.result==='green'?'g':'r')+'">'+(e.result==='green'?'GREEN':'RED')+'</span></td>'
            +'<td style="padding:5px 8px;font-family:var(--mono);font-weight:600;color:'+(e.result==='green'?'var(--green)':'var(--red)')+'">'+(e.result==='green'?'+'+fmt(e.profit):'-'+fmt(e.stake))+'</td>'
            +'<td style="padding:5px 8px;font-size:11px;color:var(--text3);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(e.obs||'—')+'</td>'
          +'</tr>';
        }).join('')
        +'</tbody></table></div>'
      +'</div>';
    } else {
      detailHtml = '<div class="cal-detail" style="color:var(--text3);font-size:12px;font-family:var(--mono);">// '+selLabel+' — nenhuma entrada neste dia'+(calFilterMethod!=='all'||calFilterCasa!=='all'?' (com filtros ativos)':'')+'</div>';
    }
  }

  // ── Assemble ─────────────────────────────────────────────────────────────
  const html = '<div class="card">'
    // Navigation
    +'<div class="cal-nav">'
      +'<button class="btn" onclick="calMove(-1)">‹ Anterior</button>'
      +'<div class="cal-month-label">'+MESES_PT[calMonth]+' '+calYear+'</div>'
      +'<button class="btn" onclick="calMove(1)">Próximo ›</button>'
      +'<button class="btn" onclick="calGoToday()" style="margin-left:auto;">Hoje</button>'
    +'</div>'
    // Filters
    + filterHtml
    // Month summary
    + summaryHtml
    // Grid
    + gridHtml
    // Day detail
    + detailHtml
    // Legend
    +'<div style="display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;">'
      +'<span style="font-size:10px;color:var(--text3);font-family:var(--mono);display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#22d3a0;"></span>100% greens</span>'
      +'<span style="font-size:10px;color:var(--text3);font-family:var(--mono);display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f25757;"></span>100% reds</span>'
      +'<span style="font-size:10px;color:var(--text3);font-family:var(--mono);display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f5a623;"></span>misto</span>'
      +'<span style="font-size:10px;color:var(--text3);font-family:var(--mono);display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--blue);"></span>hoje</span>'
    +'</div>'
  +'</div>';

  document.getElementById('s-calendario').innerHTML = html;
}

function calMove(dir){
  calMonth += dir;
  if(calMonth > 11){ calMonth=0; calYear++; }
  if(calMonth < 0 ){ calMonth=11; calYear--; }
  calSelDay = null;
  renderCalendario();
}

function calGoToday(){
  const n = new Date();
  calYear  = n.getFullYear();
  calMonth = n.getMonth();
  calSelDay = calDayKey(n);
  renderCalendario();
}

function calSelectDay(key, d, m, y){
  calSelDay = (calSelDay === key) ? null : key;
  // Navigate to that month if needed
  if(m !== calMonth){ calMonth=m; calYear=y; }
  renderCalendario();
  if(calSelDay){
    setTimeout(function(){
      const det = document.querySelector('.cal-detail');
      if(det) det.scrollIntoView({behavior:'smooth',block:'nearest'});
    },50);
  }
}

function setCalFilter(type, val){
  if(type==='method') calFilterMethod = val;
  else calFilterCasa = val;
  calSelDay = null;
  renderCalendario();
}

// ─── BACKUP GERAL / RESTAURAR ──────────────────────────────────────────────
function backupGeral(){
  const now = new Date();
  const pad = function(n){return String(n).padStart(2,'0');};
  const stamp = now.getFullYear()+''+pad(now.getMonth()+1)+pad(now.getDate())
    +'_'+pad(now.getHours())+pad(now.getMinutes())+pad(now.getSeconds());

  const payload = {
    _meta:{
      versao:4,
      geradoEm:now.toLocaleString('pt-BR'),
      totalEntradas:entradas.length,
      totalNotas:notas.length,
      totalMarcos:marcos.length,
      tipo:'backup_geral'
    },
    globalCfg,
    methodCfg,
    casas,
    entradas,
    pendentes,
    notas,
    marcos,
    backupCfg
  };

  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tradebank_GERAL_'+stamp+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);

  // Registra no histórico de backups
  recordBackupHistory('manual', 'tradebank_GERAL_'+stamp+'.json');

  // Toast de confirmação
  showBackupToast('💾 Backup geral salvo — '+entradas.length+' entradas · '+notas.length+' notas · '+marcos.length+' marcos');
}

function restaurarGeral(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(ev){
    const file = ev.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
      try{
        const payload = JSON.parse(e.target.result);

        // Validação básica
        if(!payload.entradas && !payload.casas && !payload._meta){
          alert('Arquivo inválido — não parece ser um backup do TradeBank. Verifique se é o arquivo correto.');
          return;
        }

        // Resumo para confirmação
        const meta = payload._meta || {};
        const nEnt = (payload.entradas||[]).length;
        const nNotas = (payload.notas||[]).length;
        const nMarcos = (payload.marcos||[]).length;
        const nCasas = (payload.casas||[]).length;
        const gerado = meta.geradoEm || 'data desconhecida';

        const msg = 'RESTAURAR BACKUP GERAL\n\nGerado em: '+gerado+'\nEntradas: '+nEnt+'\nCasas: '+nCasas+'\nNotas: '+nNotas+'\nMarcos: '+nMarcos+'\n\n⚠️ ATENÇÃO: Todos os dados atuais serão SUBSTITUÍDOS. Faça um backup antes se quiser preservar os dados atuais.\n\nDeseja continuar?';

        if(!confirm(msg)) return;

        // Restaurar tudo
        if(payload.globalCfg)  globalCfg  = {...globalCfg,  ...payload.globalCfg};
        if(payload.methodCfg)  methodCfg  = {...methodCfg,  ...payload.methodCfg};
        if(payload.casas   && payload.casas.length)    casas    = payload.casas;
        if(payload.entradas)   entradas   = payload.entradas;
        if(payload.pendentes)  pendentes  = payload.pendentes;
        if(payload.notas)      notas      = payload.notas;
        if(payload.marcos)     marcos     = payload.marcos   || [];
        if(payload.backupCfg)  backupCfg  = {...backupCfg, ...payload.backupCfg};

        // Garante casas padrão se vieram zeradas
        CASAS_DEFAULT.forEach(function(cd){
          if(!casas.find(function(x){return x.id===cd.id;})) casas.push({...cd});
        });
        if(!marcos) marcos = [];

        persist();
        renderAll();
        updatePendBadge();
        checkMarcosCelebration();

        showBackupToast('✅ Restauração concluída — '+nEnt+' entradas · '+nNotas+' notas · '+nMarcos+' marcos');

      }catch(err){
        alert('Erro ao ler o arquivo: '+err.message+'. Verifique se o arquivo não está corrompido.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ─── TEMA CLARO / ESCURO ───────────────────────────────────────────────────
let currentTheme = localStorage.getItem('tbTheme')||'dark';

function applyTheme(t){
  currentTheme = t;
  if(t==='light'){
    document.documentElement.classList.add('light');
  } else {
    document.documentElement.classList.remove('light');
  }
  const btn = document.getElementById('theme-toggle-btn');
  if(btn) btn.textContent = t==='light' ? '🌙' : '☀️';
  localStorage.setItem('tbTheme', t);
  updateEnvBar();
  // Re-render charts after theme switch (colors need update)
  if(dashChart){ dashChart.destroy(); dashChart=null; renderDashChart(activeMethodId, mById(activeMethodId).color); }
}

function toggleTheme(){
  applyTheme(currentTheme==='dark' ? 'light' : 'dark');
}

// ─── ALERTA SONORO ──────────────────────────────────────────────────────────
let soundEnabled = localStorage.getItem('tbSound')!=='false'; // default ON

function playSound(type){
  if(!soundEnabled) return;
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if(type==='green'){
      // Dois beeps ascendentes — celebração
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      osc.frequency.setValueAtTime(660, ctx.currentTime+0.12);
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.35);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime+0.35);
    } else if(type==='red'){
      // Beep grave descendente — atenção
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(280, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(120, ctx.currentTime+0.4);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime+0.4);
    } else if(type==='warn'){
      // Dois beeps rápidos — alerta reds consecutivos
      [0, 0.2].forEach(function(t2){
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type='square'; o2.frequency.value=320;
        g2.gain.setValueAtTime(0.12, ctx.currentTime+t2);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t2+0.15);
        o2.start(ctx.currentTime+t2);
        o2.stop(ctx.currentTime+t2+0.15);
      });
    }
  }catch(e){}
}

function setSoundEnabled(v){
  soundEnabled=v;
  localStorage.setItem('tbSound',v?'true':'false');
}

// ─── NOTIFICAÇÃO DO NAVEGADOR ───────────────────────────────────────────────
let notifEnabled = localStorage.getItem('tbNotif')==='true'; // default OFF (requer permissão)

function requestNotifPermission(){
  if(!('Notification' in window)){
    alert('Este navegador não suporta notificações.');return;
  }
  Notification.requestPermission().then(function(perm){
    notifEnabled = perm==='granted';
    localStorage.setItem('tbNotif', notifEnabled?'true':'false');
    renderConfig();
    const el=document.getElementById('db-msg');
    if(el){
      el.style.color=notifEnabled?'var(--green)':'var(--red)';
      el.textContent=notifEnabled?'// notificações ativadas!':'// permissão negada pelo navegador';
      setTimeout(function(){if(el)el.textContent='';},3000);
    }
  });
}

function sendNotification(title, body, icon){
  if(!notifEnabled||Notification.permission!=='granted') return;
  try{
    new Notification(title,{body:body,icon:icon||'',tag:'tradebank'});
  }catch(e){}
}

function triggerResultAlert(result, redsConsec){
  if(result==='green'){
    playSound('green');
  } else {
    playSound('red');
    if(redsConsec>=2){
      playSound('warn');
      sendNotification(
        'TradeBank — Reds consecutivos!',
        redsConsec+'× reds seguidos. Considere pausar as entradas.',
      );
      showBackupToast('⚠️ '+redsConsec+' reds consecutivos! Avalie pausar.');
    } else {
      sendNotification('TradeBank — Red registrado','Stake resetada para o valor base.');
    }
  }
}

// ─── INIT ──────────────────────────────────────────────────────────────────
loadData();
applyTheme(currentTheme);
